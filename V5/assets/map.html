<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouchr - Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
:root {
    --orange: #ff7426;
    --bg: #25282f;
    --phone: #060a0f;
    --line: rgba(255,255,255,.12);
    --text: #f7f8fb;
    --muted: #a3a9ba;
    --muted-2: #747b8d;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
}

.stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 14px;
}

.phone {
    width: 330px;
    height: 708px;
    border-radius: 18px;
    background:
        radial-gradient(circle at 82% 8%, rgba(255,116,38,.18), transparent 28%),
        radial-gradient(circle at 14% 42%, rgba(255,116,38,.08), transparent 30%),
        linear-gradient(180deg, #081018 0%, #04070b 100%);
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 24px 50px rgba(0,0,0,.35);
}

.content {
    height: 100%;
    overflow-y: auto;
    padding: 24px 14px 88px;
    scrollbar-width: none;
}

.content::-webkit-scrollbar {
    display: none;
}

.map-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp .45s ease both;
}

.map-header h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: -.5px;
}

.search-icon {
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--orange);
    background: rgba(255,255,255,.035);
}

.search-icon svg {
    width: 19px;
    height: 19px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.search-box {
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255,255,255,.045);
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 0 13px;
    margin-bottom: 14px;
    animation: fadeUp .45s ease .04s both;
}

.search-box svg {
    width: 21px;
    height: 21px;
    stroke: #aeb4c6;
    fill: none;
    stroke-width: 2.2;
}

.search-box input {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font-size: 13px;
}

.search-box input::placeholder {
    color: #8f96a8;
}

.filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
    animation: fadeUp .45s ease .08s both;
}

.filter-row::-webkit-scrollbar {
    display: none;
}

.filter-chip {
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 999px;
    background: rgba(255,255,255,.055);
    color: #c5cad6;
    height: 32px;
    padding: 0 12px;
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease, border-color .18s ease;
}

.filter-chip.active {
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 8px 18px rgba(255,116,38,.18);
}

.filter-chip:active {
    transform: scale(.95);
}

.map-shell {
    position: relative;
    height: 430px;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.11);
    background: #0b121a;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 16px 34px rgba(0,0,0,.25);
    animation: fadeUp .45s ease .12s both;
}

#dealMap {
    width: 100%;
    height: 100%;
    background: #0b121a;
}

/* Darken normal OpenStreetMap tiles so they fit the app theme */
.leaflet-tile {
    filter: invert(1) hue-rotate(175deg) brightness(.56) contrast(1.08) saturate(.70);
}

.leaflet-control-attribution {
    display: none;
}

.leaflet-control-zoom {
    border: 0 !important;
    box-shadow: 0 10px 24px rgba(0,0,0,.28) !important;
}

.leaflet-control-zoom a {
    width: 31px !important;
    height: 31px !important;
    line-height: 31px !important;
    background: rgba(7,12,18,.90) !important;
    color: var(--orange) !important;
    border: 1px solid rgba(255,255,255,.09) !important;
}

.deal-pin {
    width: 54px;
    height: 65px;
    position: relative;
    transform: translate(-27px, -60px);
}

.deal-pin .pin-body {
    width: 48px;
    height: 48px;
    margin: 0 auto;
    border-radius: 50% 50% 50% 0;
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    transform: rotate(-45deg);
    border: 2px solid rgba(255,255,255,.82);
    box-shadow:
        0 10px 18px rgba(0,0,0,.35),
        0 0 18px rgba(255,116,38,.22);
    display: grid;
    place-items: center;
}

.deal-pin .pin-body img {
    width: 34px;
    height: 34px;
    object-fit: cover;
    border-radius: 10px;
    transform: rotate(45deg);
    background: #fff;
}

.deal-pin.contain .pin-body img {
    object-fit: contain;
    padding: 3px;
}

.deal-pin .pin-shadow {
    width: 22px;
    height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,.38);
    margin: -1px auto 0;
    filter: blur(.3px);
}

.user-marker {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(45,133,255,.22);
    border: 1px solid rgba(45,133,255,.30);
    display: grid;
    place-items: center;
    transform: translate(-17px, -17px);
}

.user-marker::after {
    content: "";
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #2d85ff;
    border: 3px solid #fff;
    box-shadow: 0 0 18px rgba(45,133,255,.70);
}

.locate-btn {
    position: absolute;
    right: 14px;
    bottom: 128px;
    z-index: 600;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.12);
    color: #fff;
    background: rgba(7,12,18,.88);
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(0,0,0,.35);
}

.locate-btn svg {
    width: 21px;
    height: 21px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.3;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.selected-card {
    position: absolute;
    left: 13px;
    right: 13px;
    bottom: 13px;
    z-index: 650;
    min-height: 105px;
    border-radius: 19px;
    border: 1px solid rgba(255,255,255,.12);
    background:
        radial-gradient(circle at 84% 20%, rgba(255,116,38,.10), transparent 30%),
        rgba(7,12,18,.93);
    backdrop-filter: blur(16px);
    padding: 12px;
    display: grid;
    grid-template-columns: 62px 1fr;
    gap: 12px;
    box-shadow: 0 16px 32px rgba(0,0,0,.38);
}

.selected-logo {
    width: 62px;
    height: 62px;
    border-radius: 15px;
    background: #fff;
    overflow: hidden;
    display: grid;
    place-items: center;
}

.selected-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.selected-logo.contain img {
    object-fit: contain;
    padding: 5px;
}

.selected-info h3 {
    margin: 0 0 5px;
    font-size: 17px;
    line-height: 1.05;
}

.selected-info p {
    margin: 0 0 6px;
    color: var(--orange);
    font-size: 13px;
    font-weight: 900;
}

.selected-meta {
    margin-bottom: 9px;
    color: #8f96a8;
    font-size: 11.5px;
}

.selected-actions {
    display: flex;
    gap: 8px;
}

.map-btn {
    height: 34px;
    border-radius: 999px;
    border: 1px solid rgba(255,116,38,.62);
    background: rgba(255,116,38,.10);
    color: var(--orange);
    padding: 0 12px;
    font-size: 11.5px;
    font-weight: 900;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease;
}

.map-btn.primary {
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    border-color: transparent;
}

.map-btn:active {
    transform: scale(.95);
}

.bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 68px !important;
    padding: 4px 4px 5px;
    background:
        linear-gradient(180deg, rgba(10, 15, 22, .88), rgba(4, 7, 11, .98)) !important;
    border-top: 1px solid rgba(255,255,255,.11) !important;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    backdrop-filter: blur(10px);
    box-shadow: 0 -12px 26px rgba(0,0,0,.26);
    z-index: 900;
}

.nav-item {
    color: #8f96a8 !important;
    text-decoration: none;
    display: grid;
    place-items: center;
    gap: 3px;
    padding: 8px 0 7px;
    font-size: 10px;
    font-weight: 700;
    border-radius: 14px;
    transition:
        color .18s ease,
        transform .18s ease,
        background .18s ease,
        box-shadow .18s ease;
}

.nav-item:hover {
    background: rgba(255,255,255,.035);
}

.nav-item.active {
    color: #ff7426 !important;
    background: rgba(255,116,38,.075);
    box-shadow: inset 0 0 0 1px rgba(255,116,38,.12);
}

.nav-item:active {
    transform: scale(.94);
}

.nav-item em {
    font-style: normal;
    font-size: 10px;
    line-height: 1;
    font-weight: 800;
}

.nav-icon {
    width: 23px;
    height: 23px;
    display: block;
    background: currentColor;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-size: contain;
    mask-size: contain;
    transition: transform .2s ease;
}

.nav-item.active .nav-icon {
    transform: translateY(-1px) scale(1.05);
}

.nav-main {
    -webkit-mask-image: url("/assets/icon-main-menu.svg");
    mask-image: url("/assets/icon-main-menu.svg");
}

.nav-voucher {
    -webkit-mask-image: url("/assets/icon-voucher.svg");
    mask-image: url("/assets/icon-voucher.svg");
}

.nav-map {
    -webkit-mask-image: url("/assets/icon-map.svg");
    mask-image: url("/assets/icon-map.svg");
}

.nav-budget {
    -webkit-mask-image: url("/assets/icon-budget.svg");
    mask-image: url("/assets/icon-budget.svg");
}

.nav-profile {
    -webkit-mask-image: url("/assets/icon-profile.svg");
    mask-image: url("/assets/icon-profile.svg");
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(16px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   Smaller floating deal card + hide/show control
========================= */

.selected-card {
    left: 12px !important;
    right: 12px !important;
    bottom: 12px !important;
    min-height: 82px !important;
    border-radius: 17px !important;
    padding: 10px !important;
    grid-template-columns: 50px 1fr !important;
    gap: 10px !important;
    transition:
        transform .28s cubic-bezier(.2,.85,.25,1),
        opacity .22s ease,
        visibility .22s ease;
}

.selected-card.is-hidden {
    opacity: 0;
    visibility: hidden;
    transform: translateY(24px) scale(.96);
    pointer-events: none;
}

.selected-logo {
    width: 50px !important;
    height: 50px !important;
    border-radius: 13px !important;
}

.selected-info h3 {
    font-size: 15.5px !important;
    margin: 0 0 3px !important;
}

.selected-info p {
    font-size: 12px !important;
    margin: 0 0 4px !important;
}

.selected-meta {
    font-size: 10.5px !important;
    margin-bottom: 7px !important;
}

.selected-actions {
    gap: 6px !important;
}

.map-btn {
    height: 29px !important;
    padding: 0 10px !important;
    font-size: 10.5px !important;
}

.deal-card-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    color: #cfd5e2;
    display: grid;
    place-items: center;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease;
}

.deal-card-close:hover {
    background: rgba(255,116,38,.13);
    color: #ff7426;
}

.deal-card-close:active {
    transform: scale(.92);
}

.show-deal-card {
    position: absolute;
    left: 13px;
    bottom: 14px;
    z-index: 650;
    height: 36px;
    border: 1px solid rgba(255,116,38,.42);
    border-radius: 999px;
    background:
        radial-gradient(circle at 80% 20%, rgba(255,116,38,.18), transparent 36%),
        rgba(7,12,18,.92);
    color: #ff7426;
    padding: 0 13px;
    font-size: 11.5px;
    font-weight: 900;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(14px);
    box-shadow: 0 12px 24px rgba(0,0,0,.32);
}

.show-deal-card.active {
    display: inline-flex;
}

.deal-cycle-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff7426;
    box-shadow: 0 0 12px rgba(255,116,38,.55);
}

.locate-btn {
    bottom: 106px !important;
}

@media (max-width: 430px) {
    .selected-card {
        min-height: 80px !important;
    }
}


/* Map header cleanup */
.map-header {
    justify-content: flex-start !important;
}


/* =========================
   Map Voucher Popup Recovery
========================= */

#vouchrFallbackVoucherOverlay {
    position: absolute;
    inset: 0;
    z-index: 980;
    display: none;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,.62);
    backdrop-filter: blur(9px);
    pointer-events: auto;
}

#vouchrFallbackVoucherOverlay.active {
    display: flex;
}

.vouchr-fallback-sheet {
    width: 100%;
    max-height: 76%;
    overflow-y: auto;
    border-radius: 26px 26px 0 0;
    border: 1px solid rgba(255,255,255,.14);
    border-bottom: 0;
    background:
        radial-gradient(circle at 86% 8%, rgba(255,116,38,.16), transparent 28%),
        linear-gradient(180deg, #111821 0%, #070b11 100%);
    box-shadow: 0 -22px 46px rgba(0,0,0,.52);
    padding: 14px 16px 24px;
    animation: vouchrFallbackUp .26s cubic-bezier(.2,.85,.25,1) both;
}

.vouchr-fallback-handle {
    width: 46px;
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,.24);
    margin: 0 auto 14px;
}

.vouchr-fallback-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
}

.vouchr-fallback-logo {
    width: 62px;
    height: 62px;
    border-radius: 17px;
    overflow: hidden;
    background: #fff;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    box-shadow: 0 10px 20px rgba(0,0,0,.30);
}

.vouchr-fallback-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.vouchr-fallback-logo.contain img {
    object-fit: contain;
    padding: 5px;
}

.vouchr-fallback-info {
    flex: 1;
    min-width: 0;
}

.vouchr-fallback-info h2 {
    margin: 2px 0 5px;
    font-size: 20px;
    line-height: 1.1;
    color: #f7f8fb;
}

.vouchr-fallback-info p {
    margin: 0;
    color: #ff7426;
    font-size: 13px;
    font-weight: 900;
    line-height: 1.3;
}

.vouchr-fallback-close {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex: 0 0 auto;
}

.vouchr-fallback-card {
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 18px;
    background: rgba(255,255,255,.045);
    padding: 13px;
    margin-bottom: 10px;
}

.vouchr-fallback-card h3 {
    margin: 0 0 7px;
    font-size: 14px;
}

.vouchr-fallback-card p,
.vouchr-fallback-card li {
    color: #a3a9ba;
    font-size: 12.5px;
    line-height: 1.45;
}

.vouchr-fallback-card p {
    margin: 0;
}

.vouchr-fallback-card ul {
    margin: 0;
    padding-left: 18px;
}

.vouchr-fallback-actions {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 10px;
    padding-bottom: 2px;
}

.vouchr-fallback-redeem,
.vouchr-fallback-save {
    height: 46px;
    border-radius: 15px;
    font-size: 13px;
    font-weight: 950;
    cursor: pointer;
}

.vouchr-fallback-redeem {
    border: 0;
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    box-shadow: 0 12px 24px rgba(255,116,38,.22);
}

.vouchr-fallback-save {
    border: 1px solid rgba(255,116,38,.50);
    background: rgba(255,116,38,.06);
    color: #ff7426;
}

.map-voucher-card,
.map-voucher-card button,
.map-card,
.map-card button,
.view-voucher-btn,
#viewVoucherBtn,
[data-map-view-voucher] {
    pointer-events: auto !important;
    cursor: pointer !important;
}

@keyframes vouchrFallbackUp {
    from {
        opacity: 0;
        transform: translateY(42px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


/* =========================
   Final Map Budget Button Fix
   Fixes only the Budget button on map.html.
========================= */

.bottom-nav {
    z-index: 2147483000 !important;
    pointer-events: auto !important;
    position: absolute !important;
}

.bottom-nav .nav-item {
    pointer-events: auto !important;
    position: relative !important;
    z-index: 2147483001 !important;
}

.bottom-nav .nav-icon,
.bottom-nav em {
    pointer-events: none !important;
}

.map-budget-direct-link {
    pointer-events: auto !important;
    cursor: pointer !important;
    touch-action: manipulation !important;
}

.map-shell,
#dealMap,
.leaflet-container,
.leaflet-pane,
.leaflet-map-pane,
.leaflet-control-container {
    z-index: 1 !important;
}

</style>
</head>

<body>
<main class="stage">
    <section class="phone">
        <div class="content">
            <header class="map-header">
                <h1>Nearby Deals</h1>
            </header>

            <div class="search-box">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20l-3.8-3.8"></path>
                </svg>
                <input id="mapSearch" type="text" placeholder="Search restaurants or locations">
            </div>

            <div class="filter-row" id="filterRow">
                <button class="filter-chip active" data-filter="all">All</button>
                <button class="filter-chip" data-filter="food">Food</button>
                <button class="filter-chip" data-filter="cafe">Café</button>
                <button class="filter-chip" data-filter="drinks">Drinks</button>
                <button class="filter-chip" data-filter="dessert">Dessert</button>
            </div>

            <section class="map-shell">
                <div id="dealMap"></div>

                <button class="locate-btn" type="button" id="locateBtn" aria-label="Center map">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 2v4"></path>
                        <path d="M12 18v4"></path>
                        <path d="M2 12h4"></path>
                        <path d="M18 12h4"></path>
                    </svg>
                </button>

                <article class="selected-card" id="selectedDealCard">
                    <button class="deal-card-close" id="dealCardClose" type="button" aria-label="Hide selected deal">×</button>
                    <div class="selected-logo" id="selectedLogoWrap">
                        <img id="selectedLogo" src="/assets/mcdonalds-logo.png" alt="Selected restaurant logo">
                    </div>

                    <div class="selected-info">
                        <h3 id="selectedName">McDonald's</h3>
                        <p id="selectedOffer">15% OFF Total Bill</p>
                        <div class="selected-meta" id="selectedMeta">📍 1.2 km away · Fast Food</div>

                        <div class="selected-actions">
                            <button class="map-btn" type="button" id="directionBtn">Directions</button>
                            <button data-map-view-voucher="true" class="map-btn primary" type="button" id="viewVoucherBtn">View Voucher</button>
                        </div>
                    </div>
                </article>

                <button class="show-deal-card" id="showDealCardBtn" type="button">
                    <span class="deal-cycle-dot"></span>
                    Show deal
                </button>
            </section>
        </div>

        <nav class="bottom-nav">
            <a class="nav-item" href="/main-menu">
                <span class="nav-icon nav-main"></span>
                <em>Main</em>
            </a>
            <a class="nav-item" href="/voucher">
                <span class="nav-icon nav-voucher"></span>
                <em>Voucher</em>
            </a>
            <a class="nav-item active" href="/map">
                <span class="nav-icon nav-map"></span>
                <em>Map</em>
            </a>
            <a class="nav-item map-budget-direct-link"
               href="/budget"
               onpointerdown="window.location.href='/budget'; return false;"
               onmousedown="window.location.href='/budget'; return false;"
               ontouchstart="window.location.href='/budget'; return false;"
               onclick="window.location.href='/budget'; return false;">
                <span class="nav-icon nav-budget"></span>
                <em>Budget</em>
            </a>
            <a class="nav-item" href="#">
                <span class="nav-icon nav-profile"></span>
                <em>Profile</em>
            </a>
        </nav>
    </section>
</main>

<div id="voucherModalMount"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const deals = [
    {
        id: "mcdonalds",
        name: "McDonald's",
        offer: "15% OFF Total Bill",
        category: "food",
        type: "Fast Food",
        distance: "1.2 km away",
        lat: 3.1396,
        lng: 101.6869,
        logo: "/assets/mcdonalds-logo.png",
        containLogo: false
    },
    {
        id: "boost",
        name: "Boost",
        offer: "10% OFF Smoothies",
        category: "drinks",
        type: "Beverages",
        distance: "1.6 km away",
        lat: 3.1295,
        lng: 101.7245,
        logo: "/assets/boost-logo.png",
        containLogo: false
    },
    {
        id: "palmyra",
        name: "Palmyra",
        offer: "12% OFF Total Bill",
        category: "food",
        type: "Oriental Cuisine",
        distance: "2.0 km away",
        lat: 3.1288,
        lng: 101.6755,
        logo: "/assets/palmyra-logo.png",
        containLogo: true
    },
    {
        id: "good-burger",
        name: "The Good Burger",
        offer: "30% OFF Total Bill",
        category: "food",
        type: "Burgers",
        distance: "2.3 km away",
        lat: 3.1115,
        lng: 101.6657,
        logo: "/assets/logo-good-burger.png",
        containLogo: true
    },
    {
        id: "pastamania",
        name: "Pastamania",
        offer: "20% OFF Total Bill",
        category: "food",
        type: "Casual Dining",
        distance: "2.5 km away",
        lat: 3.1286,
        lng: 101.7237,
        logo: "/assets/pastamania-featured-card-fixed.png",
        containLogo: false
    },
    {
        id: "coffee-breaks",
        name: "Coffee Breaks",
        offer: "RM5 OFF Café Picks",
        category: "cafe",
        type: "Café",
        distance: "1.9 km away",
        lat: 3.1462,
        lng: 101.7117,
        logo: "/assets/coffee-breaks-card.png",
        containLogo: false
    },
    {
        id: "sweet-treats",
        name: "Sweet Treats",
        offer: "Up to 30% OFF",
        category: "dessert",
        type: "Dessert",
        distance: "2.1 km away",
        lat: 3.1478,
        lng: 101.6948,
        logo: "/assets/sweet-treats-card.png",
        containLogo: false
    }
];

let selectedDeal = deals[0];
let activeFilter = "all";
let visibleDealIds = deals.map((deal) => deal.id);
let selectedIndex = 0;
let dealCardHidden = false;
let lastUserInteraction = Date.now();
const markers = new Map();

const map = L.map("dealMap", {
    zoomControl: true,
    attributionControl: false
}).setView([3.1325, 101.6990], 13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
}).addTo(map);

const userIcon = L.divIcon({
    className: "",
    html: '<div class="user-marker"></div>',
    iconSize: [34, 34],
    iconAnchor: [17, 17]
});

L.marker([3.1319, 101.6970], { icon: userIcon }).addTo(map);

function createDealIcon(deal) {
    return L.divIcon({
        className: "",
        html: `
            <div class="deal-pin ${deal.containLogo ? "contain" : ""}">
                <div class="pin-body">
                    <img src="${deal.logo}" alt="${deal.name}">
                </div>
                <div class="pin-shadow"></div>
            </div>
        `,
        iconSize: [54, 65],
        iconAnchor: [27, 60]
    });
}

function addMarkers() {
    deals.forEach((deal) => {
        const marker = L.marker([deal.lat, deal.lng], {
            icon: createDealIcon(deal)
        }).addTo(map);

        marker.on("click", () => {
            markMapInteraction();
            selectDeal(deal.id, true);
            showDealCard();
        });

        markers.set(deal.id, marker);
    });
}

function selectDeal(dealId, panToMarker = false) {
    const found = deals.find((deal) => deal.id === dealId);
    if (!found) return;

    selectedDeal = found;
    selectedIndex = Math.max(0, visibleDealIds.indexOf(selectedDeal.id));

    document.getElementById("selectedLogo").src = selectedDeal.logo;
    document.getElementById("selectedLogo").alt = selectedDeal.name + " logo";
    document.getElementById("selectedLogoWrap").classList.toggle("contain", selectedDeal.containLogo);
    document.getElementById("selectedName").textContent = selectedDeal.name;
    document.getElementById("selectedOffer").textContent = selectedDeal.offer;
    document.getElementById("selectedMeta").textContent = "📍 " + selectedDeal.distance + " · " + selectedDeal.type;

    if (panToMarker) {
        map.panTo([selectedDeal.lat, selectedDeal.lng], {
            animate: true,
            duration: .8
        });
    }
}

function applyFilter() {
    const searchValue = document.getElementById("mapSearch").value.trim().toLowerCase();
    visibleDealIds = [];

    deals.forEach((deal) => {
        const marker = markers.get(deal.id);
        const matchesFilter = activeFilter === "all" || deal.category === activeFilter;
        const matchesSearch = [deal.name, deal.offer, deal.type, deal.distance]
            .join(" ")
            .toLowerCase()
            .includes(searchValue);

        if (matchesFilter && matchesSearch) {
            visibleDealIds.push(deal.id);

            if (!map.hasLayer(marker)) {
                marker.addTo(map);
            }
        } else {
            if (map.hasLayer(marker)) {
                marker.remove();
            }
        }
    });

    if (visibleDealIds.length && !visibleDealIds.includes(selectedDeal.id)) {
        selectDeal(visibleDealIds[0], true);
    }
}

function loadHtmlComponent(mountId, url, fallbackText) {
    const mount = document.getElementById(mountId);
    if (!mount) return Promise.resolve();

    return fetch(url)
        .then((response) => {
            if (!response.ok) {
                throw new Error(url + " failed to load");
            }
            return response.text();
        })
        .then((html) => {
            mount.innerHTML = html;

            mount.querySelectorAll("script").forEach((oldScript) => {
                const newScript = document.createElement("script");

                Array.from(oldScript.attributes).forEach((attr) => {
                    newScript.setAttribute(attr.name, attr.value);
                });

                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        })
        .catch(() => {
            mount.innerHTML = "<p style='color:#a3a9ba;font-size:12px;'>" + fallbackText + "</p>";
        });
}


function markMapInteraction() {
    lastUserInteraction = Date.now();
}

function hideDealCard() {
    dealCardHidden = true;
    document.getElementById("selectedDealCard").classList.add("is-hidden");
    document.getElementById("showDealCardBtn").classList.add("active");
    markMapInteraction();
}

function showDealCard() {
    dealCardHidden = false;
    document.getElementById("selectedDealCard").classList.remove("is-hidden");
    document.getElementById("showDealCardBtn").classList.remove("active");
    markMapInteraction();
}

function cycleToNextDeal() {
    if (dealCardHidden || !visibleDealIds.length) return;

    const idleTime = Date.now() - lastUserInteraction;

    if (idleTime < 5500) return;

    selectedIndex = (selectedIndex + 1) % visibleDealIds.length;
    selectDeal(visibleDealIds[selectedIndex], true);
}

setInterval(cycleToNextDeal, 6500);

map.on("dragstart zoomstart click", markMapInteraction);

document.getElementById("dealCardClose").addEventListener("click", (event) => {
    event.stopPropagation();
    hideDealCard();
});

document.getElementById("showDealCardBtn").addEventListener("click", showDealCard);

document.getElementById("viewVoucherBtn").addEventListener("click", () => {
    markMapInteraction();

    if (typeof window.openVoucherModal === "function") {
        window.openVoucherModal(selectedDeal.id);
    }
});

document.getElementById("directionBtn").addEventListener("click", () => {
    markMapInteraction();

    const url = `https://www.google.com/maps/search/?api=1&query=${selectedDeal.lat},${selectedDeal.lng}`;
    window.open(url, "_blank");
});

document.getElementById("locateBtn").addEventListener("click", () => {
    markMapInteraction();

    map.panTo([3.1319, 101.6970], {
        animate: true,
        duration: .45
    });
});

document.getElementById("mapSearch").addEventListener("input", () => {
    markMapInteraction();
    applyFilter();
});

document.querySelectorAll(".filter-chip").forEach((chip) => {
    chip.addEventListener("click", () => {
        markMapInteraction();
        document.querySelectorAll(".filter-chip").forEach((item) => item.classList.remove("active"));
        chip.classList.add("active");
        activeFilter = chip.dataset.filter;
        applyFilter();
    });
});

addMarkers();
selectDeal("mcdonalds");

loadHtmlComponent("voucherModalMount", "/assets/voucher_modal_component.html", "Voucher popup could not load.");
</script>

<script>
/* Map voucher button recovery */
(function () {
    const voucherData = {
        "mcdonalds": {
            name: "McDonald's",
            offer: "15% OFF Total Bill",
            logo: "/assets/mcdonalds-logo.png",
            contain: false,
            location: "Bukit Jalil, Kuala Lumpur",
            valid: "31 May 2026",
            description: "Enjoy 15% OFF your total bill at selected McDonald's outlets. Applicable for dine-in, takeaway and drive-thru orders."
        },
        "boost": {
            name: "Boost",
            offer: "10% OFF Smoothies",
            logo: "/assets/boost-logo.png",
            contain: false,
            location: "Nearby outlet",
            valid: "30 Jun 2026",
            description: "Get 10% OFF selected smoothies and drinks."
        },
        "palmyra": {
            name: "Palmyra",
            offer: "12% OFF Total Bill",
            logo: "/assets/palmyra-logo.png",
            contain: true,
            location: "Oriental Cuisine",
            valid: "30 Jun 2026",
            description: "Enjoy 12% OFF your total bill for oriental cuisine and selected meals."
        },
        "pastamania": {
            name: "Pastamania",
            offer: "20% OFF Total Bill",
            logo: "/assets/pastamania-featured-card-fixed.png",
            contain: false,
            location: "Sunway Velocity Mall",
            valid: "06 Jun 2026",
            description: "Save 20% on pasta, pizza and selected meals."
        },
        "good-burger": {
            name: "The Good Burger",
            offer: "30% OFF Total Bill",
            logo: "/assets/logo-good-burger.png",
            contain: true,
            location: "Jalan Puchong Mesra",
            valid: "24 Nov 2026",
            description: "Fantastic burger deals with up to 30% OFF your total bill."
        }
    };

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function createOverlay() {
        let overlay = document.getElementById("vouchrFallbackVoucherOverlay");
        if (overlay) return overlay;

        overlay = document.createElement("section");
        overlay.id = "vouchrFallbackVoucherOverlay";
        overlay.innerHTML = `
            <div class="vouchr-fallback-sheet">
                <div class="vouchr-fallback-handle"></div>
                <div id="vouchrFallbackContent"></div>
            </div>
        `;

        const phone = document.querySelector(".phone");
        (phone || document.body).appendChild(overlay);

        overlay.addEventListener("click", function (event) {
            if (event.target === overlay || event.target.closest("[data-vouchr-fallback-close]")) {
                overlay.classList.remove("active");
            }
        });

        return overlay;
    }

    function openVoucher(voucherId) {
        const id = voucherId || "mcdonalds";
        const data = voucherData[id] || voucherData["mcdonalds"];
        const overlay = createOverlay();
        const content = document.getElementById("vouchrFallbackContent");

        content.innerHTML = `
            <div class="vouchr-fallback-top">
                <div class="vouchr-fallback-logo ${data.contain ? "contain" : ""}">
                    <img src="${escapeHtml(data.logo)}" alt="${escapeHtml(data.name)}">
                </div>

                <div class="vouchr-fallback-info">
                    <h2>${escapeHtml(data.name)}</h2>
                    <p>${escapeHtml(data.offer)}</p>
                </div>

                <button class="vouchr-fallback-close" type="button" data-vouchr-fallback-close>×</button>
            </div>

            <div class="vouchr-fallback-card">
                <h3>Voucher Details</h3>
                <p>${escapeHtml(data.description)}</p>
            </div>

            <div class="vouchr-fallback-card">
                <h3>Information</h3>
                <p>📍 ${escapeHtml(data.location)}</p>
                <p>🕒 Valid until ${escapeHtml(data.valid)}</p>
            </div>

            <div class="vouchr-fallback-card">
                <h3>Terms & Conditions</h3>
                <ul>
                    <li>Valid at selected outlets only.</li>
                    <li>Not exchangeable for cash.</li>
                    <li>Cannot be combined with other promotions.</li>
                </ul>
            </div>

            <div class="vouchr-fallback-actions">
                <button class="vouchr-fallback-redeem" type="button">Redeem Voucher</button>
                <button class="vouchr-fallback-save" type="button">Save Voucher</button>
            </div>
        `;

        overlay.classList.add("active");
    }

    if (typeof window.openVoucherModal !== "function") {
        window.openVoucherModal = openVoucher;
    }

    function detectVoucherId(element) {
        if (!element) return "mcdonalds";

        const direct =
            element.getAttribute("data-voucher-id") ||
            element.getAttribute("data-map-voucher-id") ||
            element.dataset.voucherId ||
            "";

        if (direct) return direct;

        const text = (element.textContent || "").toLowerCase();

        if (text.includes("mcdonald")) return "mcdonalds";
        if (text.includes("boost")) return "boost";
        if (text.includes("palmyra")) return "palmyra";
        if (text.includes("pastamania")) return "pastamania";
        if (text.includes("good burger") || text.includes("burger")) return "good-burger";

        return "mcdonalds";
    }

    document.addEventListener("click", function (event) {
        const viewButton = event.target.closest(
            "#viewVoucherBtn, .view-voucher-btn, [data-map-view-voucher], .map-voucher-card .view-btn, .map-card .view-btn"
        );

        if (!viewButton) return;

        const card = viewButton.closest("[data-voucher-id], [data-map-voucher-id], .map-voucher-card, .map-card") || viewButton;
        const voucherId = detectVoucherId(card);

        event.preventDefault();
        event.stopPropagation();

        if (typeof window.openVoucherModal === "function") {
            window.openVoucherModal(voucherId);
        } else {
            openVoucher(voucherId);
        }
    }, false);
})();
</script>


<script>
/* Final Map Budget Button JS */
(function () {
    function goBudget(event) {
        const budgetButton = event.target.closest(".map-budget-direct-link, .bottom-nav .nav-item");

        if (!budgetButton) return;

        const isBudget =
            budgetButton.classList.contains("map-budget-direct-link") ||
            !!budgetButton.querySelector(".nav-budget");

        if (!isBudget) return;

        event.preventDefault();
        event.stopPropagation();
        if (event.stopImmediatePropagation) event.stopImmediatePropagation();

        window.location.replace("/budget");
    }

    document.addEventListener("pointerdown", goBudget, true);
    document.addEventListener("click", goBudget, true);
    document.addEventListener("touchstart", goBudget, true);
})();
</script>
