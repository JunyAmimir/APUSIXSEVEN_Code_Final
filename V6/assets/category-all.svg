<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17131a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff7a00" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="144" height="144" rx="26" fill="url(#cardGrad)" stroke="#ff7a00" stroke-width="2" filter="url(#glow)"/>
  <rect x="8" y="8" width="144" height="144" rx="26" fill="#ff7a00" fill-opacity="0.05"/>

  <g fill="#ff7a00">
    <rect x="56" y="44" width="20" height="20" rx="4"/>
    <rect x="84" y="44" width="20" height="20" rx="4"/>
    <rect x="56" y="72" width="20" height="20" rx="4"/>
    <rect x="84" y="72" width="20" height="20" rx="4"/>
  </g>

  <text x="80" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#ff7a00">All</text>
</svg>
