<!-- Add Expense Component -->
<style>
.add-expense-overlay {
    position: absolute;
    inset: 0;
    z-index: 980;
    display: none;
    align-items: flex-end;
    background: rgba(0,0,0,.60);
    backdrop-filter: blur(8px);
}

.add-expense-overlay.active {
    display: flex;
}

.add-expense-sheet {
    width: 100%;
    max-height: 90%;
    overflow-y: auto;
    border-radius: 26px 26px 0 0;
    border: 1px solid rgba(255,255,255,.12);
    border-bottom: 0;
    background:
        radial-gradient(circle at 86% 8%, rgba(255,116,38,.14), transparent 26%),
        linear-gradient(180deg, #111821 0%, #070b11 100%);
    padding: 13px 16px 20px;
    box-shadow: 0 -20px 44px rgba(0,0,0,.48);
    animation: addExpenseUp .28s cubic-bezier(.2,.85,.25,1) both;
    scrollbar-width: none;
}

.add-expense-sheet::-webkit-scrollbar {
    display: none;
}

.add-expense-handle {
    width: 46px;
    height: 5px;

    margin: 0 auto 14px;
}

.add-expense-head {
    display: grid;
    grid-template-columns: 36px 1fr 36px;
    align-items: center;
    margin-bottom: 16px;
}

.add-expense-head h3 {
    text-align: center;
    margin: 0;
    font-size: 21px;
    letter-spacing: -.3px;
}

.add-expense-close {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 22px;
    cursor: pointer;
}

.form-label {
    display: block;
    margin: 0 0 8px;
    color: #d7dce8;
    font-size: 13px;
    font-weight: 850;
}

.merchant-search-wrap {
    position: relative;
    margin-bottom: 14px;
}

.merchant-input-shell {
    height: 52px;
    border: 1px solid rgba(255,116,38,.45);
    border-radius: 16px;
    background:
        radial-gradient(circle at 92% 22%, rgba(255,116,38,.10), transparent 34%),
        rgba(255,255,255,.045);
    display: grid;
    grid-template-columns: 35px 1fr 28px;
    align-items: center;

#merchantSearchInput {

.merchant-option span {

.category-row {

.category-row::-webkit-scrollbar {

.category-choice.active {

.field-shell {

}

.field-icon {

    display: grid;

}

.field-shell input,
.field-shell textarea {

    background: transparent;

}

.remaining-preview {

    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 0 12px;

}

.remaining-preview .preview-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(65,190,90,.13);
    color: #65d96e;
    display: grid;
    place-items: center;
    font-size: 17px;
}

.remaining-preview span {
    color: #cbd1dd;
    font-size: 12px;
}

.remaining-preview strong {
    color: #ff8a24;
    font-size: 16px;
}

.action-row {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 10px;
}

.cancel-expense-btn,
.save-expense-btn {
    height: 49px;
    border-radius: 15px;
    font-size: 14px;
    font-weight: 950;
    cursor: pointer;
}

.cancel-expense-btn {
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.045);
    color: #f7f8fb;
}

.save-expense-btn {
    border: 0;
    background:
        radial-gradient(circle at 26% 22%, rgba(255,255,255,.18), transparent 26%),
        linear-gradient(145deg, #ff8a24, #f25a0b);

}

@keyframes addExpenseUp {
    from {
        opacity: 0;
        transform: translateY(42px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.add-expense-svg-icon {
    width: 21px;
    height: 21px;
    display: block;
    object-fit: contain;
}
.merchant-logo .add-expense-svg-icon {
    width: 27px;
    height: 27px;
}
.category-choice .add-expense-svg-icon,
.field-icon .add-expense-svg-icon,
.preview-icon .add-expense-svg-icon {
    width: 19px;
    height: 19px;
}


/* =========================
   Add Expense Animation Pack
========================= */

.add-expense-sheet {
    animation: addExpenseSheetSpring .32s cubic-bezier(.2,.85,.25,1) both !important;
}

.merchant-input-shell,
.amount-shell,
.category-row,
.field-shell,
.remaining-preview,
.action-row {
    opacity: 0;
    transform: translateY(10px);
    animation: addExpenseFieldIn .36s cubic-bezier(.2,.8,.2,1) forwards;
}

.merchant-input-shell { animation-delay: .04s; }
.amount-shell { animation-delay: .08s; }
.category-row { animation-delay: .12s; }
.field-shell:nth-of-type(1) { animation-delay: .16s; }
.field-shell:nth-of-type(2) { animation-delay: .20s; }
.field-shell:nth-of-type(3) { animation-delay: .24s; }
.remaining-preview { animation-delay: .28s; }
.action-row { animation-delay: .32s; }

.merchant-option,
.category-choice,
.cancel-expense-btn,
.save-expense-btn,
.clear-merchant,
.add-expense-close {
    transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
}

.merchant-option:hover,
.category-choice:hover {
    transform: translateY(-1px);
}

.category-choice:active,
.cancel-expense-btn:active,
.save-expense-btn:active,
.add-expense-close:active,
.clear-merchant:active {
    transform: scale(.96);
}

.save-expense-btn {
    position: relative;
    overflow: hidden;
}

.save-expense-btn::after {
    content: "";
    position: absolute;
    inset: -55%;
    background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.20), transparent 62%);
    transform: translateX(-85%) rotate(12deg);
    animation: addExpenseButtonShine 3.4s ease-in-out infinite;
}

@keyframes addExpenseSheetSpring {
    from {
        opacity: 0;
        transform: translateY(48px) scale(.985);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes addExpenseFieldIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes addExpenseButtonShine {
    0%, 64% {
        transform: translateX(-85%) rotate(12deg);
    }
    80%, 100% {
        transform: translateX(85%) rotate(12deg);
    }
}


/* =========================
   Smooth Category Carousel Fix
   Native momentum scrolling, no sticky drag feel.
========================= */

.category-row {
    display: flex !important;
    flex-wrap: nowrap !important;
    gap: 10px !important;
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: auto !important;

    padding: 10px 22px 12px 2px !important;

    -webkit-overflow-scrolling: touch !important;
    overscroll-behavior-x: contain !important;
    scroll-behavior: smooth !important;
    touch-action: pan-x pan-y !important;
    cursor: default !important;
    position: relative !important;
    z-index: 5 !important;
    mask-image: linear-gradient(90deg, #000 0%, #000 86%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 86%, transparent 100%);
}

.category-row::-webkit-scrollbar {
    display: none !important;
    width: 0 !important;
    height: 0 !important;
}

.category-choice {
    flex: 0 0 auto !important;
    min-width: 116px !important;
    height: 48px !important;
    white-space: nowrap !important;
    user-select: none !important;
    -webkit-user-select: none !important;
    transform: translateZ(0);
    will-change: transform;
    pointer-events: auto !important;
    position: relative !important;
    z-index: 10 !important;
    touch-action: manipulation !important;
}

.category-choice:active {
    transform: scale(.97) !important;
}

.category-choice.active {
    box-shadow:
        0 0 0 1px rgba(255,116,38,.08),
        0 8px 18px rgba(255,116,38,.10) !important;
    transform: translateZ(0);
}

.add-expense-sheet {
    overflow-x: hidden !important;
}

/* Small hint that more categories exist to the right */
.category-row::after {
    content: "";
    flex: 0 0 12px;
    pointer-events: none !important;
}



/* Drag-friendly category carousel */
.category-row {
    cursor: grab !important;
    scroll-behavior: auto !important;
}
.category-row.is-dragging {
    cursor: grabbing !important;
    user-select: none !important;
    -webkit-user-select: none !important;

}

/* Final category row fit fix.
   The shared phone-frame stylesheet makes sheets flex containers, which can shrink this carousel. */
.add-expense-sheet {
    display: block !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
}

.add-expense-sheet > * {

}

}

    height: 48px !important;

}

/* Final side-space trim for the category carousel.
   Keeps swipe enabled without reopening on a half-scrolled blank edge. */
.category-row {
    gap: 8px !important;
    min-height: 58px !important;
    padding: 4px 0 8px 0 !important;
    margin: 0 0 14px 0 !important;
    justify-content: flex-start !important;

</style>

<section class="add-expense-overlay" id="addExpenseOverlay">
    <div class="add-expense-sheet">
        <div class="add-expense-handle"></div>

        <div class="add-expense-head">
            <button class="add-expense-close" id="closeAddExpenseBtn" type="button">×</button>
            <h3>Add Expense</h3>
            <div></div>
        </div>

        <label class="form-label" for="merchantSearchInput">Merchant</label>
        <div class="merchant-search-wrap">
            <div class="merchant-input-shell">
                <svg class="search-svg" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20l-3.8-3.8"></path>

                <input id="merchantSearchInput" type="text" placeholder="Search or type merchant name" autocomplete="off">

            <button class="category-choice" type="button" data-category="cafe"><img class="add-expense-svg-icon" src="/assets/budget-icons/icon-cafe.svg" alt=""> Café</button>

            <button class="category-choice" type="button" data-category="desserts"><img class="add-expense-svg-icon" src="/assets/budget-icons/icon-desserts.svg" alt=""> Desserts</button>
        </div>

<script>
(function () {
    const overlay = document.getElementById("addExpenseOverlay");
    const merchantInput = document.getElementById("merchantSearchInput");
    const clearMerchantBtn = document.getElementById("clearMerchantBtn");
    const suggestions = document.getElementById("merchantSuggestions");
    const amountInput = document.getElementById("expenseAmountInput");
    const savedInput = document.getElementById("expenseSavedInput");
    const dateInput = document.getElementById("expenseDateInput");
    const categoryInput = document.getElementById("expenseCategory");
    const categoryRow = document.querySelector(".category-row");
    const remainingText = document.getElementById("remainingAfterExpense");

    let selectedCategory = "food";
    let selectedMerchant = "";
    let selectedVoucherId = "";
    let latestSummary = null;

    const merchants = [
        {
            name: "McDonald's",
            category: "food",
            voucherId: "mcdonalds",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-food.svg" alt="">'
        },
        {
            name: "Boost",
            category: "drinks",
            voucherId: "boost",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-drinks.svg" alt="">'
        },
        {
            name: "Pastamania",
            category: "food",
            voucherId: "pastamania",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-food.svg" alt="">'
        },
        {
            name: "The Good Burger",
            category: "food",
            voucherId: "good-burger",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-food.svg" alt="">'
        },
        {
            name: "Palmyra",
            category: "food",
            voucherId: "palmyra",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-food.svg" alt="">'
        },
        {
            name: "Coffee Breaks",
            category: "cafe",
            voucherId: "coffee-breaks",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-cafe.svg" alt="">'
        },
        {
            name: "Sweet Treats",
            category: "desserts",
            voucherId: "sweet-treats",
            icon: '<img class="add-expense-svg-icon" src="/assets/budget-icons/icon-desserts.svg" alt="">'
        }
    ];

    function rm(value) {
        return "RM" + Number(value || 0).toFixed(2);
    }

    function todayString() {
        return new Date().toISOString().slice(0, 10);
    }

    function setCategory(category) {
        selectedCategory = category || "food";

        if (categoryInput) {
            categoryInput.value = selectedCategory;
        }

        document.querySelectorAll(".category-choice").forEach((button) => {
            button.classList.toggle("active", button.dataset.category === selectedCategory);
        });
    }

    function updateRemainingPreview() {
        if (!latestSummary) {
            remainingText.textContent = "RM0.00";
            return;
        }

        const remaining = Number(latestSummary.remaining || 0);
        const amount = Number(amountInput.value || 0);
        remainingText.textContent = rm(Math.max(remaining - amount, 0));
    }

    function renderSuggestions() {
        const query = merchantInput.value.trim().toLowerCase();
        clearMerchantBtn.classList.toggle("active", Boolean(query));

        if (!query) {
            suggestions.classList.remove("active");
            suggestions.innerHTML = "";
            return;
        }

        const matches = merchants.filter((merchant) => {
            return merchant.name.toLowerCase().includes(query);
        }).slice(0, 4);

        if (!matches.length) {
            suggestions.classList.remove("active");
            suggestions.innerHTML = "";
            return;
        }

        suggestions.innerHTML = matches.map((merchant) => `
            <div class="merchant-option" data-merchant="${merchant.name}" data-category="${merchant.category}" data-voucher-id="${merchant.voucherId}">
                <div class="merchant-logo">${merchant.icon}</div>
                <div>
                    <strong>${merchant.name}</strong>
                    <span>${merchant.category}</span>
                </div>
            </div>
        `).join("");

        suggestions.classList.add("active");
    }

    function selectMerchant(option) {
        selectedMerchant = option.dataset.merchant || "";
        selectedVoucherId = option.dataset.voucherId || "";

        merchantInput.value = selectedMerchant;

        if (option.dataset.category) {
            setCategory(option.dataset.category);
        }

        suggestions.classList.remove("active");
        renderSuggestions();
    }

    function resetForm() {
        selectedCategory = "food";
        selectedMerchant = "";
        selectedVoucherId = "";
        merchantInput.value = "";
        amountInput.value = "";
        savedInput.value = "";
        document.getElementById("expenseNoteInput").value = "";
        dateInput.value = todayString();
        setCategory("food");
        renderSuggestions();
        updateRemainingPreview();
    }

    function open() {
        resetForm();
        if (categoryRow) {
            categoryRow.scrollLeft = 0;
            categoryRow.dataset.dragMoved = "false";
        }
        overlay.classList.add("active");

        setTimeout(() => {
            merchantInput.focus();
        }, 180);
    }

    function close() {
        overlay.classList.remove("active");
    }

    async function saveExpense() {
        const merchant = merchantInput.value.trim();
        const amount = Number(amountInput.value || 0);
        const saved = Number(savedInput.value || 0);

        if (!merchant) {
            alert("Please enter a merchant name.");
            merchantInput.focus();
            return;
        }

        if (!amount || amount <= 0) {
            alert("Please enter a valid amount.");
            amountInput.focus();
            return;
        }

        const response = await fetch("/api/budget/expense", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                merchant,
                amount,
                saved,
                category: categoryInput ? categoryInput.value : selectedCategory,
                voucher_id: selectedVoucherId,
                date: dateInput.value || todayString()
            })
        });

        const result = await response.json();

        if (!result.success) {
            alert(result.message || "Could not save expense.");
            return;
        }

        close();

        if (typeof window.refreshBudgetSummary === "function") {
            window.refreshBudgetSummary();
        }
    }

    merchantInput.addEventListener("input", () => {
        selectedMerchant = merchantInput.value.trim();
        selectedVoucherId = "";
        renderSuggestions();
    });

    suggestions.addEventListener("click", (event) => {
        const option = event.target.closest(".merchant-option");
        if (!option) return;
        selectMerchant(option);
    });

    clearMerchantBtn.addEventListener("click", () => {
        merchantInput.value = "";
        selectedMerchant = "";
        selectedVoucherId = "";
        merchantInput.focus();
        renderSuggestions();
    });

    amountInput.addEventListener("input", updateRemainingPreview);

    document.querySelectorAll(".category-choice").forEach((button) => {
        button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (button.closest(".category-row")?.dataset.dragMoved === "true") return;
            setCategory(button.dataset.category);
        });
    });

    document.getElementById("closeAddExpenseBtn").addEventListener("click", close);
    document.getElementById("cancelExpenseBtn").addEventListener("click", close);
    document.getElementById("saveExpenseBtn").addEventListener("click", saveExpense);

    overlay.addEventListener("click", (event) => {
        if (event.target === overlay) close();
    });

    dateInput.value = todayString();

    window.AddExpenseComponent = {
        open,
        close,
        setBudgetSummary(summary) {
            latestSummary = summary;
            updateRemainingPreview();
        }
    };
})();
</script>


<script>
/* Smooth draggable category carousel */
(function () {
    function bindDraggableCategoryCarousel() {
        const row = document.querySelector('.category-row');
        if (!row || row.dataset.dragCarouselFixed === 'true') return;

        row.dataset.dragCarouselFixed = 'true';

        let pointerId = null;
        let startX = 0;
        let startScrollLeft = 0;
        let moved = false;
        let suppressClick = false;
        const DRAG_THRESHOLD = 8;

        row.addEventListener('pointerdown', function (event) {
            if (event.pointerType === 'mouse' && event.button !== 0) return;
            pointerId = event.pointerId;
            startX = event.clientX;
            startScrollLeft = row.scrollLeft;
            moved = false;
            suppressClick = false;
            row.dataset.dragMoved = 'false';
        });

        row.addEventListener('pointermove', function (event) {
            if (pointerId === null || event.pointerId !== pointerId) return;
            const dx = event.clientX - startX;

            if (!moved && Math.abs(dx) > DRAG_THRESHOLD) {
                moved = true;
                suppressClick = true;
                row.classList.add('is-dragging');
                try { row.setPointerCapture(pointerId); } catch (e) {}
            }

            if (moved) {
                row.scrollLeft = startScrollLeft - dx;
                event.preventDefault();
            }
        });

        function endDrag(event) {
            if (pointerId === null) return;
            if (event && 'pointerId' in event && event.pointerId !== pointerId) return;
            try { row.releasePointerCapture(pointerId); } catch (e) {}
            pointerId = null;
            row.classList.remove('is-dragging');
            if (suppressClick) {
                row.dataset.dragMoved = 'true';
                setTimeout(() => {
                    row.dataset.dragMoved = 'false';
                    suppressClick = false;
                }, 140);
            } else {
                row.dataset.dragMoved = 'false';
            }
        }

        row.addEventListener('pointerup', endDrag);
        row.addEventListener('pointercancel', endDrag);
        row.addEventListener('lostpointercapture', endDrag);
        row.addEventListener('pointerleave', function (event) {
            if (pointerId !== null && event.buttons === 0) endDrag(event);
        });

        row.addEventListener('click', function (event) {
            if (row.dataset.dragMoved === 'true') {
                event.preventDefault();
                event.stopPropagation();
                row.dataset.dragMoved = 'false';
            }
        }, true);
    }

    bindDraggableCategoryCarousel();
    setTimeout(bindDraggableCategoryCarousel, 300);
})();
</script>
