<!DOCTYPE html>
<html lang="en">

<title>Vouchr - AI Money Coach</title>

<style>
:root {
    --orange: #ff7426;
    --bg: #25282f;
    --phone: #060a0f;
    --surface: rgba(255,255,255,.055);
    --line: rgba(255,255,255,.12);
    --text: #f7f8fb;
    --muted: #a3a9ba;
    --green: #62d26f;
    --red: #ff5b5b;
    --blue: #5b8cff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
}

.stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 14px;
}

.phone {
    width: 330px;
    height: 708px;
    border-radius: 18px;
    background:
        radial-gradient(circle at 82% 8%, rgba(255,116,38,.18), transparent 28%),
        radial-gradient(circle at 14% 42%, rgba(255,116,38,.08), transparent 30%),
        linear-gradient(180deg, #081018 0%, #04070b 100%);
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 24px 50px rgba(0,0,0,.35);
}

.chat-scroll {
    height: 100%;
    overflow-y: auto;
    padding: 22px 14px 92px;
    scrollbar-width: none;
}

.chat-scroll::-webkit-scrollbar {
    display: none;
}

.coach-head {
    display: grid;
    grid-template-columns: 40px 1fr 38px;
    gap: 11px;
    align-items: center;
    margin-bottom: 14px;
}

.back-btn,
.refresh-btn {
    width: 38px;
    height: 38px;
    border-radius: 15px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    color: #fff;
    display: grid;
    place-items: center;
    text-decoration: none;
    font-size: 20px;
    cursor: pointer;
}

.coach-title h1 {
    margin: 0;
    font-size: 25px;
    line-height: 1.05;
    font-weight: 950;
    letter-spacing: -.6px;
}

.coach-title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
}

.bot-hero {
    border: 1px solid var(--line);
    border-radius: 24px;
    background:
        radial-gradient(circle at 90% 10%, rgba(255,116,38,.16), transparent 30%),
        rgba(255,255,255,.045);
    padding: 14px;
    margin-bottom: 13px;
    display: grid;
    grid-template-columns: 76px 1fr;
    gap: 12px;
    align-items: center;
}

.coach-bot {
    width: 72px;
    height: 70px;
    position: relative;
    filter: drop-shadow(0 12px 20px rgba(255,116,38,.20));
    animation: botFloat 2.8s ease-in-out infinite;
}

.coach-bot .body {
    position: absolute;
    left: 8px;
    right: 8px;
    top: 13px;
    bottom: 7px;
    border-radius: 20px;
    background:
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.5), transparent 20%),
        linear-gradient(145deg, #f4f7ff 0%, #c8d1dd 45%, #6f7a89 100%);
    border: 2px solid rgba(255,116,38,.75);
}

.coach-bot .screen {
    position: absolute;
    left: 9px;
    right: 9px;
    top: 13px;
    height: 28px;
    border-radius: 12px;
    background: linear-gradient(180deg, #101c2a, #06101a);
    border: 1px solid rgba(255,255,255,.16);
}

.coach-bot .eye {
    position: absolute;
    top: 9px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ffbf3f;
    box-shadow: 0 0 8px rgba(255,191,63,.75);
}

.coach-bot .eye.left { left: 10px; }
.coach-bot .eye.right { right: 10px; }

.coach-bot .mouth {
    position: absolute;
    left: 22px;
    top: 18px;
    width: 12px;
    height: 6px;
    border-bottom: 2px solid #ffbf3f;
    border-radius: 0 0 10px 10px;
}

.coach-bot .ear {
    position: absolute;
    top: 26px;
    width: 8px;
    height: 21px;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff9b46, #ff4d9a);
}

.coach-bot .ear.left { left: 0; }
.coach-bot .ear.right { right: 0; }

.coach-bot .crown {
    position: absolute;
    left: 26px;
    top: 3px;
    width: 26px;
    height: 16px;
    background: #ffbf3f;
    clip-path: polygon(0 100%, 10% 20%, 32% 70%, 50% 0, 68% 70%, 90% 20%, 100% 100%);
}

.coach-bot.mood-warning .eye {
    border-radius: 0;
    transform: rotate(45deg);
    background: #ff7426;
}

.coach-bot.mood-panic .eye {
    background: #ff5b5b;
}

.coach-bot.mood-thinking .mouth {
    width: 9px;
    border-radius: 999px;
    border-bottom: 0;
    height: 3px;
    background: #ffbf3f;
    top: 20px;
}

.bot-text strong {
    display: block;
    font-size: 16px;
    margin-bottom: 5px;
}

.bot-text p {
    margin: 0;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.35;
}

.health-card {
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 13px;
    background: rgba(255,255,255,.045);
    margin-bottom: 13px;
}

.health-top {
    display: flex;
    align-items: center;
    gap: 12px;
}

.score-ring {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: conic-gradient(var(--orange) var(--score-angle, 78%), rgba(255,255,255,.08) 0);
    display: grid;
    place-items: center;
    flex: 0 0 auto;
}

.score-ring-inner {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: #071019;
    display: grid;
    place-items: center;
    text-align: center;
    font-weight: 950;
    font-size: 18px;
}

.score-ring-inner small {
    display: block;
    font-size: 9px;
    color: var(--muted);
    margin-top: -6px;
}

.health-copy h2 {
    margin: 0 0 5px;
    font-size: 17px;
}

.health-copy p {
    margin: 0;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.35;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    margin-top: 12px;
}

.stat {
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    background: rgba(255,255,255,.035);
    padding: 9px;
}

.stat small {
    display: block;
    color: var(--muted);
    font-size: 10px;
    margin-bottom: 5px;
}

.stat strong {
    font-size: 13px;
}

.chat {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 13px;
}

.message {
    max-width: 86%;
    border-radius: 18px;
    padding: 11px 12px;
    font-size: 12.8px;
    line-height: 1.38;
    animation: popIn .22s ease both;
}

.message.bot {
    align-self: flex-start;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    color: #dce1ee;
}

.message.user {
    align-self: flex-end;
    background: linear-gradient(145deg, #ff8a24, #ff6515);
    color: #fff;
    font-weight: 750;
}

.quick-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 10px;
}

.quick-row::-webkit-scrollbar {
    display: none;
}

.quick-btn {
    flex: 0 0 auto;
    border: 1px solid rgba(255,116,38,.45);
    background: rgba(255,116,38,.08);
    color: var(--orange);
    border-radius: 999px;
    padding: 9px 12px;
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
}

.input-bar {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 76px;
    display: grid;
    grid-template-columns: 1fr 44px;
    gap: 9px;
}

.input-bar input {
    height: 44px;
    border-radius: 17px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.055);
    outline: 0;
    color: #fff;
    padding: 0 14px;
    font-size: 12.5px;
}

.input-bar button {
    border: 0;
    border-radius: 16px;
    background: linear-gradient(145deg, #ff8a24, #ff6515);
    color: #fff;
    font-size: 20px;
    font-weight: 950;
    cursor: pointer;
}

.bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 68px;
    padding: 4px;
    background: rgba(5, 8, 13, .96);
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    backdrop-filter: blur(10px);
}

.nav-item {
    color: #8f96a8;
    text-decoration: none;
    display: grid;
    place-items: center;
    gap: 3px;
    padding: 8px 0 7px;
    font-size: 10px;
    font-weight: 800;
    border-radius: 14px;
}

.nav-item.active {
    color: var(--orange);
    background: rgba(255,116,38,.075);
}

.nav-icon {
    width: 23px;
    height: 23px;
    display: block;
    background: currentColor;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-size: contain;
    mask-size: contain;
}

.nav-main { -webkit-mask-image: url("/assets/nav_icon/icon-main-menu.svg"); mask-image: url("/assets/nav_icon/icon-main-menu.svg"); }
.nav-voucher { -webkit-mask-image: url("/assets/nav_icon/icon-voucher.svg"); mask-image: url("/assets/nav_icon/icon-voucher.svg"); }
.nav-map { -webkit-mask-image: url("/assets/nav_icon/icon-map.svg"); mask-image: url("/assets/nav_icon/icon-map.svg"); }
.nav-budget { -webkit-mask-image: url("/assets/nav_icon/icon-budget.svg"); mask-image: url("/assets/nav_icon/icon-budget.svg"); }
.nav-profile { -webkit-mask-image: url("/assets/nav_icon/icon-profile.svg"); mask-image: url("/assets/nav_icon/icon-profile.svg"); }

@keyframes botFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

@keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* =========================

========================= */

.quick-row {
    pointer-events: auto !important;

/* =========================

========================= */

.coach-bot,
.ai-money-bot,
#coachBot {
    animation:

@keyframes coachBotFloat {
    0%, 100% { transform: translateY(0) rotate(-1deg); }

}

    box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
}

.mini-robot::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 10px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ffbf3f;
    box-shadow:
        9px 0 0 #ffbf3f,
        0 0 7px rgba(255,191,63,.78);
    animation: miniBotBlink 3.8s ease-in-out .7s infinite;
}

@keyframes miniBotCircleFloat {
    0%, 100% {
        transform: translateY(0) rotate(0deg);
    }
    35% {
        transform: translateY(-7px) rotate(-2deg);
    }
    65% {
        transform: translateY(-4px) rotate(2deg);
    }
}

@keyframes miniBotCircleGlow {
    0%, 100% {
        border-color: rgba(255,116,38,.58);
        box-shadow:
            0 10px 24px rgba(0,0,0,.34),
            0 0 12px rgba(255,116,38,.16);
    }
    50% {
        border-color: rgba(255,145,72,1);
        box-shadow:
            0 14px 28px rgba(0,0,0,.40),
            0 0 26px rgba(255,116,38,.48);
    }
}

@keyframes miniBotInnerGlow {
    0%, 100% {
        opacity: .45;
        transform: scale(.9);
    }
    50% {
        opacity: 1;
        transform: scale(1.12);
    }
}

@keyframes miniBotIdle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-2px) rotate(-2deg); }
    50% { transform: translateY(0) rotate(0deg); }
    75% { transform: translateY(-2px) rotate(2deg); }
}

@keyframes miniBotBlink {
    0%, 44%, 48%, 100% {
        height: 5px;
        transform: translateY(0);
    }
    46% {
        height: 2px;
        transform: translateY(2px);
    }
}

</style>
</head>

<body>
<main class="stage">
    <section class="phone">
        <div class="chat-scroll">
            <header class="coach-head">
                <a class="back-btn" href="/budget" aria-label="Back to budget">‹</a>
                <div class="coach-title">
                    <h1>AI Money Coach</h1>
                    <p>Budget advice and saving tips</p>
                </div>
                <button class="refresh-btn" id="refreshCoach" type="button" aria-label="Refresh advice">↻</button>
            </header>

            <section class="bot-hero" id="botHero">
                <button class="hide-bot-btn" id="hideBotBtn" type="button" aria-label="Hide coach summary" title="Hide coach summary"></button>
                <div class="coach-bot" id="coachBot">
                    <span class="crown"></span>
                    <span class="ear left"></span>
                    <span class="ear right"></span>
                    <span class="body">
                        <span class="screen">
                            <span class="eye left"></span>
                            <span class="eye right"></span>
                            <span class="mouth"></span>
                        </span>
                    </span>
                </div>

                <div class="bot-text">
                    <strong id="coachStatus">Loading...</strong>
                    <p id="coachHeadline">Checking your budget health.</p>
                </div>
            </section>

            <section class="chat" id="chatMessages">
                <div class="message bot">Ask me anything about your budget. I can help you spend smarter, save more, or plan a simple challenge.</div>
            </section>

            <div class="quick-row">
                <button class="quick-btn" data-message="Check my budget health">Budget health</button>
                <button class="quick-btn" data-message="How can I save more this week?">Save more</button>
                <button class="quick-btn" data-message="What is my biggest spending?">Top spending</button>
                <button class="quick-btn" data-message="Give me a saving challenge">Saving challenge</button>
            </div>

            <form class="input-bar" id="coachForm">
                <input id="coachInput" type="text" placeholder="Ask your AI coach...">
                <button type="submit" aria-label="Send coach message">&#10148;</button>
            </form>
        </div>

        <button class="restore-bot-btn" id="restoreBotBtn" type="button" aria-label="Show coach summary" title="Show coach summary">
            <span class="mini-robot" aria-hidden="true"></span>
        </button>

        <nav class="bottom-nav">
            <a class="nav-item" href="/main-menu">
                <span class="nav-icon nav-main"></span>
                <em>Main</em>
            </a>
            <a class="nav-item" href="/voucher">
                <span class="nav-icon nav-voucher"></span>
                <em>Voucher</em>
            </a>
            <a class="nav-item" href="/map">
                <span class="nav-icon nav-map"></span>
                <em>Map</em>
            </a>
            <a class="nav-item active" href="/budget">
                <span class="nav-icon nav-budget"></span>
                <em>Budget</em>
            </a>
            <a class="nav-item" href="/profile">
                <span class="nav-icon nav-profile"></span>
                <em>Profile</em>
            </a>
        </nav>
    </section>
</main>

<script>
const chatMessages = document.getElementById("chatMessages");
const coachForm = document.getElementById("coachForm");
const coachInput = document.getElementById("coachInput");
const coachBot = document.getElementById("coachBot");

function money(value) {
    return "RM" + Number(value || 0).toFixed(0);
}

function addMessage(text, type = "bot") {
    const message = document.createElement("div");
    message.className = "message " + type;
    message.textContent = text;
    chatMessages.appendChild(message);
    
    if (chatMessages) {
        chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: "smooth" });
    }
    
}

function setMood(mood) {
    const safeMood = mood || "happy";
    const hero = coachBot.closest(".bot-hero");

    coachBot.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
    coachBot.classList.add("mood-" + safeMood);

    if (hero) {
        hero.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
        hero.classList.add("mood-" + safeMood);
    }
}

function setRingState(percent) {
    const rawPercent = Number(percent || 0);
    const safePercent = Math.max(0, Math.min(100, rawPercent));
    const ring = document.getElementById("scoreRing");
    const healthScore = document.getElementById("healthScore");

    if (ring) {
        ring.style.setProperty("--score-angle", safePercent + "%");
        ring.style.removeProperty("background");
        ring.classList.remove("usage-zero", "usage-low", "usage-mid", "usage-high", "usage-over");

        if (rawPercent <= 0.5) ring.classList.add("usage-zero");
        else if (rawPercent <= 50) ring.classList.add("usage-low");
        else if (rawPercent <= 75) ring.classList.add("usage-mid");
        else if (rawPercent <= 100) ring.classList.add("usage-high");
        else ring.classList.add("usage-over");
    }

    if (healthScore) {
        healthScore.textContent = Math.round(rawPercent) + "%";
    }
}

window.setAiCoachRingState = setRingState;

async function loadCoach(message = "") {
    setMood(message ? "thinking" : "happy");

    const options = message
        ? {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        }
        : {};

    const response = await fetch("/api/ai-money-coach", options);
    const data = await response.json();

    document.getElementById("coachStatus").textContent = data.status || "Budget Coach";
    document.getElementById("coachHeadline").textContent = data.ai_enabled ? "Real AI is giving advice based on your budget." : (data.headline || "Here is your money summary.");

    setMood(data.mood || "happy");

    if (message) {
        addMessage(data.reply || "I checked your spending and prepared advice.", "bot");
    }
}

document.getElementById("refreshCoach").addEventListener("click", () => {
    loadCoach();
});

document.getElementById("hideBotBtn").addEventListener("click", () => {
    document.getElementById("botHero").classList.add("is-hidden");
    document.getElementById("restoreBotBtn").classList.add("active");
});

document.getElementById("restoreBotBtn").addEventListener("click", () => {
    document.getElementById("botHero").classList.remove("is-hidden");
    document.getElementById("restoreBotBtn").classList.remove("active");
});

loadCoach();
</script>


<script>
/* Quick buttons hard reset handler */
(function () {
    function money(value) {
        return "RM" + Number(value || 0).toFixed(0);
    }

    function scrollChat() {
        const chat = document.getElementById("chatMessages");
        if (chat) {
            chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
        }
    }

    function addBubble(text, type) {
        const chat = document.getElementById("chatMessages");
        if (!chat) return;

        const bubble = document.createElement("div");
        bubble.className = "message " + (type || "bot");
        bubble.textContent = text;
        chat.appendChild(bubble);
        scrollChat();
    }

    function setCoachMood(mood) {
        const bot = document.getElementById("coachBot");
        if (!bot) return;

        const safeMood = mood || "happy";
        const hero = bot.closest(".bot-hero");

        bot.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
        bot.classList.add("mood-" + safeMood);

        if (hero) {
            hero.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
            hero.classList.add("mood-" + safeMood);
        }
    }

    function updateDashboard(data) {
        const status = document.getElementById("coachStatus");
        const headline = document.getElementById("coachHeadline");
        const healthScore = document.getElementById("healthScore");
        const scoreRing = document.getElementById("scoreRing");
        const healthTip = document.getElementById("healthTip");
        const statBudget = document.getElementById("statBudget");
        const statSpent = document.getElementById("statSpent");
        const statRemain = document.getElementById("statRemain");

        if (status) status.textContent = data.status || "Budget Coach";
        if (headline) headline.textContent = data.ai_enabled ? "Real AI is giving advice based on your budget." : (data.headline || "Here is your money summary.");
        if (window.setAiCoachRingState) {
            window.setAiCoachRingState(data.used_percent);
        } else {
            if (healthScore) healthScore.textContent = Math.round(Number(data.used_percent || 0)) + "%";
            if (scoreRing) scoreRing.style.setProperty("--score-angle", `${Math.min(100, Number(data.used_percent || 0))}%`);
        }
        if (healthTip) healthTip.textContent = data.tip || "Keep tracking expenses for better advice.";
        if (statBudget) statBudget.textContent = money(data.monthly_budget);
        if (statSpent) statSpent.textContent = money(data.total_spent);
        if (statRemain) statRemain.textContent = money(data.remaining);

        setCoachMood(data.mood || "happy");
    }

    async function askCoach(text) {
        if (!text) return;

        addBubble(text, "user");
        setCoachMood("thinking");

        try {
            const response = await fetch("/api/ai-money-coach", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            updateDashboard(data);
            addBubble(data.reply || "I checked your spending and prepared advice.", "bot");
        } catch (error) {
            console.error(error);
            setCoachMood("warning");
            addBubble("I could not reach the AI coach right now. Check your terminal, then try again.", "bot");
        }
    }

    function setupForm() {
        const form = document.getElementById("coachForm");
        const input = document.getElementById("coachInput");

        if (!form || !input || form.dataset.hardResetReady === "true") return;

        form.dataset.hardResetReady = "true";

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            askCoach(text);
        });
    }

    function setupQuickRows() {
        document.querySelectorAll(".quick-row").forEach((row) => {
            if (row.dataset.hardResetReady === "true") return;
            row.dataset.hardResetReady = "true";

            row.querySelectorAll(".quick-btn").forEach((oldButton) => {
                const button = oldButton.cloneNode(true);
                oldButton.replaceWith(button);

                let down = false;
                let startX = 0;
                let startScrollLeft = 0;
                let moved = false;

                button.addEventListener("pointerdown", function (event) {
                    down = true;
                    moved = false;
                    startX = event.clientX;
                    startScrollLeft = row.scrollLeft;
                    button.classList.add("quick-pressed");
                    row.classList.add("dragging");

                    try {
                        button.setPointerCapture(event.pointerId);
                    } catch (_) {}
                });

                button.addEventListener("pointermove", function (event) {
                    if (!down) return;

                    const dx = event.clientX - startX;

                    if (Math.abs(dx) > 10) {
                        moved = true;
                        row.scrollLeft = startScrollLeft - dx;
                        event.preventDefault();
                    }
                });

                button.addEventListener("pointerup", function (event) {
                    if (!down) return;

                    down = false;
                    button.classList.remove("quick-pressed");
                    row.classList.remove("dragging");

                    try {
                        button.releasePointerCapture(event.pointerId);
                    } catch (_) {}

                    event.preventDefault();
                    event.stopPropagation();

                    if (!moved) {
                        const text = button.dataset.message || button.textContent.trim();
                        askCoach(text);
                    }
                });

                button.addEventListener("pointercancel", function () {
                    down = false;
                    moved = false;
                    button.classList.remove("quick-pressed");
                    row.classList.remove("dragging");
                });

                button.addEventListener("click", function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                });
            });

            row.addEventListener("wheel", function (event) {
                const delta = Math.abs(event.deltaY) > Math.abs(event.deltaX) ? event.deltaY : event.deltaX;

                if (delta !== 0) {
                    row.scrollLeft += delta;
                    event.preventDefault();
                }
            }, { passive: false });
        });
    }

    setupForm();
    setupQuickRows();

    document.addEventListener("DOMContentLoaded", function () {
        setupForm();
        setupQuickRows();
    });
})();
</script>


<script>
/* AI Coach Direct Budget Sync Fix */
(function () {
    function money(value) {
        return "RM" + Number(value || 0).toFixed(0);
    }

    function setText(id, text) {
        const el = document.getElementById(id);
        if (el) el.textContent = text;
    }

    function setUsageRing(percent) {
        if (window.setAiCoachRingState) {
            window.setAiCoachRingState(percent);
            return;
        }

        const rawPercent = Number(percent || 0);
        const safePercent = Math.max(0, Math.min(100, rawPercent));
        const ring = document.getElementById("scoreRing");
        const healthScore = document.getElementById("healthScore");

        if (ring) {
            ring.style.setProperty("--score-angle", safePercent + "%");
            ring.style.removeProperty("background");
            ring.classList.remove("usage-zero", "usage-low", "usage-mid", "usage-high", "usage-over");

            if (rawPercent <= 0.5) ring.classList.add("usage-zero");
            else if (rawPercent <= 50) ring.classList.add("usage-low");
            else if (rawPercent <= 75) ring.classList.add("usage-mid");
            else if (rawPercent <= 100) ring.classList.add("usage-high");
            else ring.classList.add("usage-over");
        }

        if (healthScore) {
            healthScore.textContent = Math.round(rawPercent) + "%";
        }
    }

    function moodFromUsage(percent) {
        const used = Number(percent || 0);
        if (used <= 50) return "happy";
        if (used <= 75) return "thinking";
        if (used <= 100) return "warning";
        return "panic";
    }

    function setCoachMood(mood) {
        const bot = document.getElementById("coachBot");
        if (!bot) return;

        const safeMood = mood || "happy";
        const hero = bot.closest(".bot-hero");

        bot.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
        bot.classList.add("mood-" + safeMood);

        if (hero) {
            hero.classList.remove("mood-happy", "mood-thinking", "mood-warning", "mood-panic");
            hero.classList.add("mood-" + safeMood);
        }
    }

    async function syncBudgetFromSummary() {
        try {
            const response = await fetch("/api/budget/summary", { cache: "no-store" });
            const data = await response.json();

            const monthlyBudget = Number(data.monthly_budget ?? data.monthlyBudget ?? data.budget ?? 0);
            const spent = Number(data.spent ?? data.total_spent ?? data.totalSpent ?? 0);
            const remaining = Number(data.remaining ?? Math.max(0, monthlyBudget - spent));
            const usedPercent = Number(data.usage_percent ?? data.used_percent ?? (monthlyBudget > 0 ? (spent / monthlyBudget) * 100 : 0));

            setUsageRing(usedPercent);
            setText("statBudget", money(monthlyBudget));
            setText("statSpent", money(spent));
            setText("statRemain", money(remaining));
            setCoachMood(moodFromUsage(usedPercent));

            const status = document.getElementById("coachStatus");
            const headline = document.getElementById("coachHeadline");
            const tip = document.getElementById("healthTip");

            if (status) {
                if (usedPercent <= 50) status.textContent = "On track";
                else if (usedPercent <= 75) status.textContent = "Watchful";
                else if (usedPercent <= 100) status.textContent = "Careful";
                else status.textContent = "Over budget";
            }

            if (headline) {
                headline.textContent = usedPercent <= 50
                    ? "You are doing well so far."
                    : "Your spending is picking up. Keep an eye on your budget.";
            }

            if (tip) {
                tip.textContent = `${Math.round(usedPercent)}% of your budget used. ${money(spent)} spent, ${money(remaining)} remaining.`;
            }
        } catch (error) {
            console.warn("Budget sync failed:", error);
        }
    }

    window.syncBudgetFromSummary = syncBudgetFromSummary;

    document.addEventListener("DOMContentLoaded", syncBudgetFromSummary);
    syncBudgetFromSummary();

    setInterval(syncBudgetFromSummary, 5000);
})();
</script>
