<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouchr - Auth</title>

<style>
:root {
    --orange: #ff7426;
    --text: #f6f7fb;
    --muted: #9ba2b7;
    --line: rgba(255, 255, 255, 0.11);
    --page-bg: #25282f;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--page-bg);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
}

.stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 14px;
}

.phone {
    width: 330px;
    height: 708px;
    background:
        radial-gradient(circle at 50% 0%, rgba(255, 116, 38, .12), transparent 34%),
        linear-gradient(180deg, #14161c 0%, #0f1013 100%);
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, .08);
    box-shadow: 0 24px 50px rgba(0, 0, 0, .35);
    padding: 20px 28px 20px;
    animation: none;
}

@keyframes authPageEnter {
    from { opacity: 0; transform: scale(0.96) translateY(18px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.toast {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(-16px);
    width: 268px;
    min-height: 38px;
    border-radius: 13px;
    padding: 10px 13px;
    background: rgba(255, 116, 38, .95);
    color: white;
    font-size: 12px;
    font-weight: 900;
    text-align: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 14px 28px rgba(0,0,0,.28);
    transition: opacity .25s ease, transform .25s ease;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.corner-fan {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: .32;
}

.corner-fan.top {
    width: 210px;
    height: 210px;
    top: -130px;
    left: -105px;
    background: repeating-conic-gradient(
        from 0deg,
        rgba(255, 255, 255, .18) 0deg 4deg,
        transparent 4deg 8deg
    );
}

.back-link {
    position: absolute;
    top: 20px;
    left: 20px;
    color: var(--muted);
    text-decoration: none;
    font-size: 24px;
    font-weight: 900;
    z-index: 5;
    transition: transform .18s ease, color .18s ease;
}

.back-link:hover { color: #fff; }
.back-link:active { transform: scale(0.9); }

.vouchr-auth-logo {
    position: relative;
    width: fit-content;
    margin: 24px auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f6f7fb;
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -2px;
    z-index: 3;
    animation: logoAuthEnter 0.9s ease both;
}

.vouchr-auth-logo .orange { color: var(--orange); }

.logo-letter {
    display: inline-block;
    animation: logoLetterPop 0.7s ease both;
}

.logo-letter:nth-child(1) { animation-delay: 0.08s; }
.logo-letter:nth-child(2) { animation-delay: 0.16s; }
.logo-letter:nth-child(4) { animation-delay: 0.28s; }

.ticket-o {
    width: 38px;
    height: 30px;
    background: var(--orange);
    border-radius: 11px;
    color: white;
    display: grid;
    place-items: center;
    font-size: 15px;
    margin: 0 -2px;
    position: relative;
    transform: translateY(1px);
    animation: ticketBounce 0.9s cubic-bezier(.2, .9, .2, 1.25) both;
    animation-delay: 0.2s;
}

.ticket-o::before {
    content: "";
    position: absolute;
    width: 22px;
    height: 16px;
    border: 4px solid var(--orange);
    border-bottom: 0;
    border-radius: 18px 18px 0 0;
    top: -11px;
    left: 8px;
}

.speed-lines {
    position: absolute;
    width: 44px;
    height: 14px;
    left: 47px;
    bottom: -5px;
}

.speed-lines i {
    display: block;
    height: 2px;
    border-radius: 99px;
    background: var(--orange);
    margin: 3px 0;
    opacity: .75;
    transform-origin: left center;
    animation: speedLineIn 0.5s ease both;
}

.speed-lines i:nth-child(1) { width: 30px; animation-delay: 0.55s; }
.speed-lines i:nth-child(2) { width: 44px; animation-delay: 0.63s; }
.speed-lines i:nth-child(3) { width: 22px; animation-delay: 0.71s; }

@keyframes logoAuthEnter {
    0% { opacity: 0; transform: translateY(18px) scale(0.94); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes logoLetterPop {
    0% { opacity: 0; transform: translateY(10px) scale(0.9); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

@keyframes ticketBounce {
    0% { opacity: 0; transform: translateY(-14px) scale(0.75) rotate(-12deg); }
    60% { opacity: 1; transform: translateY(4px) scale(1.08) rotate(4deg); }
    100% { opacity: 1; transform: translateY(1px) scale(1) rotate(0deg); }
}

@keyframes speedLineIn {
    0% { opacity: 0; transform: scaleX(0) translateX(12px); }
    100% { opacity: 0.75; transform: scaleX(1) translateX(0); }
}

.subtitle {
    text-align: center;
    margin: 5px 0 22px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
}

.role-label {
    text-align: center;
    color: var(--text);
    font-size: 14px;
    font-weight: 800;
    margin: 0 0 12px;
}

.role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 18px;
}

.role-card {
    height: 108px;
    border-radius: 22px;
    background: rgba(255, 255, 255, .035);
    border: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.role-card:hover { transform: translateY(-2px); }
.role-card:active { transform: scale(0.96); }

.role-card.active {
    border: 2px solid var(--orange);
    background: rgba(255, 116, 38, .08);
    color: var(--text);
    box-shadow: 0 0 24px rgba(255, 116, 38, .18);
}

.role-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, .08);
    font-size: 18px;
}

.role-card.active .role-icon {
    background: linear-gradient(145deg, #ff8a3d, #ff651f);
    color: #fff;
}

.role-card strong {
    font-size: 14px;
    color: inherit;
}

.role-card small {
    width: 90px;
    color: inherit;
    font-size: 10px;
    line-height: 1.3;
}

.auth-tabs {
    height: 44px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, .035);
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 5px;
    margin-bottom: 16px;
}

.auth-tabs button {
    border: 0;
    border-radius: 12px;
    background: transparent;
    color: var(--muted);
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.18s ease, background .18s ease, color .18s ease;
}

.auth-tabs button:active { transform: scale(0.96); }

.auth-tabs button.active {
    color: #fff;
    background: linear-gradient(145deg, #ff8a3d, #ff651f);
    box-shadow: 0 8px 18px rgba(255, 116, 38, .28);
}

.form-group {
    margin-bottom: 12px;
}

.form-group label {
    display: block;
    margin-bottom: 7px;
    color: var(--text);
    font-size: 13px;
    font-weight: 900;
}

.input-wrap {
    height: 43px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, .035);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    transition: border-color .2s ease, box-shadow .2s ease;
}

.input-wrap:focus-within {
    border-color: rgba(255, 116, 38, .75);
    box-shadow: 0 0 0 3px rgba(255, 116, 38, .10);
}

.input-wrap span {
    color: var(--muted);
    font-size: 18px;
}

.input-wrap input {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font-size: 14px;
}

.input-wrap input::placeholder { color: #70778b; }

.forgot {
    display: block;
    width: fit-content;
    margin-left: auto;
    margin-top: 3px;
    margin-bottom: 16px;
    color: #d7dbea;
    font-size: 13px;
    font-weight: 900;
    text-decoration: none;
    transition: color .2s ease, transform .18s ease;
}

.forgot:hover { color: var(--orange); }
.forgot:active { transform: scale(0.96); }

.login-btn {
    width: 100%;
    height: 49px;
    border: 0;
    border-radius: 14px;
    background: linear-gradient(145deg, #ff8a3d, #ff651f);
    color: #fff;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: .3px;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(255, 116, 38, .28);
    transition: transform .18s ease, box-shadow .18s ease;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 34px rgba(255, 116, 38, .36);
}

.login-btn:active { transform: scale(0.96); }

.role-label,
.role-grid,
.auth-tabs,
form {
    opacity: 0;
    animation: authContentUp 0.65s ease both;
}

.role-label { animation-delay: 0.35s; }
.role-grid { animation-delay: 0.45s; }
.auth-tabs { animation-delay: 0.58s; }
form { animation-delay: 0.7s; }

@keyframes authContentUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Sign Up overlay */
.signup-view {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: #121220;
    color: #303342;
    display: none;
    overflow: hidden;
}

.signup-view.show {
    display: block;
    animation: signupViewIn .42s cubic-bezier(.2, .85, .25, 1) both;
}

.signup-view.closing {
    display: block;
    animation: signupViewOut .34s ease both;
}

@keyframes signupViewIn {
    from { opacity: 0; transform: translateX(28px) scale(.985); }
    to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes signupViewOut {
    from { opacity: 1; transform: translateX(0) scale(1); }
    to { opacity: 0; transform: translateX(28px) scale(.985); }
}

.signup-hero {
    position: relative;
    height: 226px;
    background: #121220;
    color: #fff;
    overflow: hidden;
    padding-top: 34px;
}

.signup-fan {
    position: absolute;
    width: 190px;
    height: 190px;
    top: -98px;
    left: -90px;
    border-radius: 50%;
    opacity: .36;
    background: repeating-conic-gradient(
        from 0deg,
        rgba(255, 255, 255, .18) 0deg 4deg,
        transparent 4deg 8deg
    );
}

.signup-dash {
    position: absolute;
    right: -24px;
    top: 18px;
    width: 96px;
    height: 178px;
    border: 2px dashed rgba(255, 116, 38, .38);
    border-radius: 45px;
    transform: rotate(25deg);
}

.signup-back {
    position: absolute;
    top: 42px;
    left: 22px;
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 50%;
    background: linear-gradient(180deg, #ffffff 0%, #f4f6fb 100%);
    color: #2f3442;
    display: grid;
    place-items: center;
    padding: 0;
    box-shadow: 0 10px 22px rgba(0, 0, 0, .18), inset 0 1px 0 rgba(255, 255, 255, .9);
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
}

.signup-back svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    stroke-width: 2.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transform: translateX(-1px);
}

.signup-back:hover {
    transform: translateY(-2px);
    box-shadow: 0 13px 26px rgba(0, 0, 0, .22), inset 0 1px 0 rgba(255, 255, 255, .95);
}

.signup-back:active { transform: scale(.92); }

.signup-title {
    text-align: center;
    margin: 76px 0 8px;
    font-size: 26px;
    font-weight: 900;
}

.signup-subtitle {
    text-align: center;
    margin: 0;
    color: #c5c7d2;
    font-size: 14px;
    font-weight: 700;
}

.signup-panel {
    position: absolute;
    left: 0;
    right: 0;
    top: 212px;
    bottom: 0;
    background: #fff;
    border-radius: 34px 34px 0 0;
    padding: 24px 20px 16px;
    box-shadow: 0 -16px 28px rgba(0, 0, 0, .08);
    animation: signupPanelUp .55s ease .08s both;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.signup-panel::-webkit-scrollbar {
    display: none;
}

@keyframes signupPanelUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
}

.signup-role-choice {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
    opacity: 0;
    animation: signupFieldUp .46s ease .12s both;
}

.signup-role-btn {
    height: 40px;
    border: 1px solid #dde4ef;
    border-radius: 11px;
    background: #f3f7fc;
    color: #7b8293;
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
}

.signup-role-btn.active {
    border-color: var(--orange);
    background: rgba(255, 116, 38, .12);
    color: var(--orange);
    box-shadow: 0 8px 18px rgba(255, 116, 38, .12);
    animation: roleChoicePop .25s ease both;
}

.signup-role-btn:active { transform: scale(.96); }

@keyframes roleChoicePop {
    0% { transform: scale(.96); }
    60% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

.signup-group {
    margin-bottom: 8px;
    opacity: 0;
    animation: signupFieldUp .46s ease both;
}

.signup-group:nth-child(2) { animation-delay: .18s; }
.signup-group:nth-child(3) { animation-delay: .25s; }
.signup-group:nth-child(4) { animation-delay: .32s; }
.signup-group:nth-child(5) { animation-delay: .39s; }

@keyframes signupFieldUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
}

.signup-group label {
    display: block;
    margin: 0 0 5px;
    color: #626776;
    font-size: 10.5px;
    font-weight: 900;
    letter-spacing: .4px;
    text-transform: uppercase;
}

.signup-input {
    height: 42px;
    width: 100%;
    border: 0;
    outline: 0;
    border-radius: 9px;
    background: #eef3f9;
    color: #303342;
    padding: 0 18px;
    font-size: 13px;
    font-weight: 700;
    transition: box-shadow .2s ease;
}

.signup-input::placeholder { color: #b9c0ce; }

.signup-input:focus {
    box-shadow: 0 0 0 3px rgba(255, 116, 38, .16);
}

.password-line {
    position: relative;
}

.password-line .signup-input {
    padding-right: 48px;
}

.eye-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: #9aa4b4;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform .18s ease, background .18s ease, color .18s ease, opacity .18s ease;
}

.eye-toggle:hover {
    background: rgba(255, 116, 38, .10);
    color: var(--orange);
}

.eye-toggle:active {
    transform: translateY(-50%) scale(.88);
}

.eye-toggle svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    position: absolute;
    transition: opacity .22s ease, transform .22s ease;
}

.eye-toggle .eye-open {
    opacity: 0;
    transform: scale(.72) rotate(12deg);
}

.eye-toggle .eye-closed {
    opacity: 1;
    transform: scale(1) rotate(0deg);
}

.eye-toggle.is-visible .eye-open {
    opacity: 1;
    transform: scale(1) rotate(0deg);
}

.eye-toggle.is-visible .eye-closed {
    opacity: 0;
    transform: scale(.72) rotate(-12deg);
}

.password-line.visibility-pulse .signup-input {
    animation: passwordPulse .32s ease;
}

@keyframes passwordPulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 116, 38, .0); }
    45% { box-shadow: 0 0 0 3px rgba(255, 116, 38, .16); }
    100% { box-shadow: 0 0 0 0 rgba(255, 116, 38, .0); }
}

.signup-submit {
    width: 100%;
    height: 47px;
    border: 0;
    border-radius: 10px;
    margin-top: 5px;
    background: var(--orange);
    color: #fff;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .6px;
    cursor: pointer;
    transition: transform .18s ease, box-shadow .18s ease;
}

.signup-submit:hover {
    box-shadow: 0 12px 24px rgba(255, 116, 38, .26);
    transform: translateY(-2px);
}

.signup-submit:active { transform: scale(.96); }
</style>

</head>

<body>
<main class="stage">
    <section class="phone">
        <div class="toast" id="toast"></div>
        <div class="corner-fan top"></div>

        <a class="back-link" href="/">‹</a>

        <div class="auth-content" id="phonePageContent">
        <div class="vouchr-auth-logo">
            <span class="logo-letter">V</span>
            <span class="logo-letter orange">o</span>
            <span class="ticket-o">🎟</span>
            <span class="logo-letter">chr</span>
            <span class="speed-lines">
                <i></i><i></i><i></i>
            </span>
        </div>

        <p class="subtitle">Global Savings, Local Flavor</p>

        <p class="role-label">I am a...</p>

        <div class="role-grid">
            <button class="role-card active" type="button" id="userRole">
                <div class="role-icon">👤</div>
                <strong>User</strong>
                <small>Find & redeem vouchers</small>
            </button>

            <button class="role-card" type="button" id="merchantRole">
                <div class="role-icon">🏪</div>
                <strong>Merchant</strong>
                <small>Grow your business</small>
            </button>
        </div>

        <div class="auth-tabs">
            <button class="active" type="button" id="loginTab">Login</button>
            <button type="button" id="signupTab">Sign Up</button>
        </div>

        <form method="POST" action="/login" id="loginForm">
            <input type="hidden" name="role" id="loginRoleInput" value="user">

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <span>✉</span>
                    <input id="emailInput" name="email" type="email" placeholder="alex@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span>🔒</span>
                    <input name="password" type="password" placeholder="••••••••" required>
                </div>
            </div>

            <a class="forgot" href="#">Forgot Password?</a>

            <button class="login-btn" type="submit">
                LOGIN
            </button>
        </form>

        </div>

        <section class="signup-view" id="signupView">
            <div class="signup-hero">
                <div class="signup-fan"></div>
                <div class="signup-dash"></div>

                <button class="signup-back" type="button" id="signupBack" aria-label="Back to login">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15.5 5.5L9 12l6.5 6.5" />
                    </svg>
                </button>

                <h1 class="signup-title">Sign Up</h1>
                <p class="signup-subtitle">Please sign up to get started</p>
            </div>

            <form class="signup-panel" method="POST" action="/signup" id="signupForm" enctype="multipart/form-data" style="overflow-y: auto;">
                <input type="hidden" name="role" id="signupRoleInput" value="user">

                <div class="signup-role-choice">
                    <button class="signup-role-btn active" type="button" id="signupUserRole">User</button>
                    <button class="signup-role-btn" type="button" id="signupMerchantRole">Merchant</button>
                </div>

                <div class="signup-group">
                    <label id="signupNameLabel">Name</label>
                    <input class="signup-input" id="signupNameInput" name="name" type="text" placeholder="John doe" required>
                </div>

                <div class="signup-group">
                    <label id="signupEmailLabel">Email</label>
                    <input class="signup-input" id="signupEmailInput" name="email" type="email" placeholder="example@gmail.com" required>
                </div>

                <div class="signup-group">
                    <label>Password</label>
                    <div class="password-line">
                        <input class="signup-input password-input" name="password" type="password" placeholder="••••••••••" required minlength="4">
                        <button class="eye-toggle" type="button" aria-label="Show password" data-visible="false">
                            <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3 3l18 18"/>
                                <path d="M10.6 10.6A2.9 2.9 0 0 0 12 15a3 3 0 0 0 2.2-.95"/>
                                <path d="M7.1 7.4C4.2 9.1 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.7 0 3.2-.45 4.5-1.1"/>
                                <path d="M14.1 5.8c4.5.9 7.4 6.2 7.4 6.2s-.8 1.55-2.3 3.1"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="signup-group">
                    <label>Re-type Password</label>
                    <div class="password-line">
                        <input class="signup-input password-input" name="confirm_password" type="password" placeholder="••••••••••" required minlength="4">
                        <button class="eye-toggle" type="button" aria-label="Show password" data-visible="false">
                            <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M3 3l18 18"/>
                                <path d="M10.6 10.6A2.9 2.9 0 0 0 12 15a3 3 0 0 0 2.2-.95"/>
                                <path d="M7.1 7.4C4.2 9.1 2.5 12 2.5 12s3.5 6.5 9.5 6.5c1.7 0 3.2-.45 4.5-1.1"/>
                                <path d="M14.1 5.8c4.5.9 7.4 6.2 7.4 6.2s-.8 1.55-2.3 3.1"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="signup-group" id="businessAddressGroup" style="display: none;">
                    <label>Business Address</label>
                    <input class="signup-input" id="businessAddressInput" name="address" type="text" placeholder="123, Street Name, City">
                </div>

                <div class="signup-group" id="storeImageGroup" style="display: none; margin-bottom: 8px;">
                    <label>Store Photo (Required for Merchants)</label>
                    <input class="signup-input" type="file" name="store_image" accept="image/png, image/jpeg, image/jpg" style="padding-top: 11px; cursor: pointer;">
                </div>

                <button class="signup-submit" id="signupSubmitBtn" type="submit">
                    SIGN UP
                </button>
            </form>
        </section>
    </section>
</main>

<script>
const userRole = document.getElementById("userRole");
const merchantRole = document.getElementById("merchantRole");
const emailInput = document.getElementById("emailInput");
const loginRoleInput = document.getElementById("loginRoleInput");

const signupTab = document.getElementById("signupTab");
const signupView = document.getElementById("signupView");
const signupBack = document.getElementById("signupBack");

const signupUserRole = document.getElementById("signupUserRole");
const signupMerchantRole = document.getElementById("signupMerchantRole");
const signupNameLabel = document.getElementById("signupNameLabel");
const signupNameInput = document.getElementById("signupNameInput");
const signupEmailLabel = document.getElementById("signupEmailLabel");
const signupEmailInput = document.getElementById("signupEmailInput");
const signupSubmitBtn = document.getElementById("signupSubmitBtn");
const signupRoleInput = document.getElementById("signupRoleInput");

const toast = document.getElementById("toast");

const validationSignupForm = document.getElementById("signupForm");
const validationLoginForm = document.getElementById("loginForm");

function isValidEmailFormat(email) {
    const emailPattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
    return emailPattern.test(email.trim());
}

validationSignupForm.addEventListener("submit", function(event) {
    const emailInput = document.getElementById("signupEmailInput");
    const emailValue = emailInput.value.trim();

    if (!isValidEmailFormat(emailValue)) {
        event.preventDefault();
        event.stopPropagation();

        emailInput.setCustomValidity("Please enter a valid email address, for example example@gmail.com");
        emailInput.reportValidity();
        emailInput.focus();

        return false;
    }

    emailInput.setCustomValidity("");
});

validationLoginForm.addEventListener("submit", function(event) {
    const emailInput = document.getElementById("emailInput");
    const emailValue = emailInput.value.trim();

    if (!isValidEmailFormat(emailValue)) {
        event.preventDefault();
        event.stopPropagation();

        emailInput.setCustomValidity("Please enter a valid email address, for example alex@example.com");
        emailInput.reportValidity();
        emailInput.focus();

        return false;
    }

    emailInput.setCustomValidity("");
});

document.getElementById("signupEmailInput").addEventListener("input", function() {
    this.setCustomValidity("");
});

document.getElementById("emailInput").addEventListener("input", function() {
    this.setCustomValidity("");
});

function showToast(message) {
    if (!message) return;
    toast.textContent = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3300);
}

function showMessageFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const message = params.get("message");

    if (message) {
        showToast(message);
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}

showMessageFromUrl();

document.addEventListener("DOMContentLoaded", function () {
    const content = document.getElementById("phonePageContent")
        || document.querySelector(".phone-page-content")
        || document.querySelector(".phone-app-content")
        || document.querySelector(".auth-content")
        || document.querySelector(".login-content");

    if (content) {
        content.classList.remove("page-leaving", "page-entering", "hidden");
        content.classList.add("page-active");
        content.style.opacity = "1";
        content.style.visibility = "visible";
        content.style.transform = "translateY(0)";
        content.style.pointerEvents = "auto";
    }

    setTimeout(() => {
        document.querySelectorAll(".auth-content .subtitle, .auth-content .role-label, .auth-content .role-grid, .auth-content .auth-tabs, .auth-content #loginForm").forEach((element) => {
            element.classList.remove("page-leaving", "page-entering", "hidden");
            element.style.visibility = "visible";
            element.style.position = "relative";
            element.style.zIndex = "5";

            if (getComputedStyle(element).opacity === "0") {
                element.style.opacity = "1";
                element.style.transform = "translateY(0)";
            }
        });
    }, 900);
});

userRole.addEventListener("click", () => {
    userRole.classList.add("active");
    merchantRole.classList.remove("active");
    emailInput.placeholder = "alex@example.com";
    loginRoleInput.value = "user";
});

merchantRole.addEventListener("click", () => {
    merchantRole.classList.add("active");
    userRole.classList.remove("active");
    emailInput.placeholder = "merchant@example.com";
    loginRoleInput.value = "merchant";
});

signupTab.addEventListener("click", () => {
    signupView.classList.remove("closing");
    signupView.classList.add("show");
});

signupBack.addEventListener("click", () => {
    signupView.classList.add("closing");
    signupView.classList.remove("show");

    setTimeout(() => {
        signupView.classList.remove("closing");
    }, 340);
});

function setSignupRole(role) {
    const isMerchant = role === "merchant";

    signupRoleInput.value = role;

    signupMerchantRole.classList.toggle("active", isMerchant);
    signupUserRole.classList.toggle("active", !isMerchant);

    signupNameLabel.textContent = isMerchant ? "Business Name" : "Name";
    signupNameInput.placeholder = isMerchant ? "The Burger Joint" : "John doe";

    signupEmailLabel.textContent = isMerchant ? "Business Email" : "Email";
    signupEmailInput.placeholder = isMerchant ? "merchant@example.com" : "example@gmail.com";

    signupSubmitBtn.textContent = isMerchant ? "CREATE MERCHANT ACCOUNT" : "SIGN UP";
    const businessAddressGroup = document.getElementById("businessAddressGroup");
    const businessAddressInput = document.getElementById("businessAddressInput");
    const storeImageGroup = document.getElementById("storeImageGroup");
    const storeImageInput = storeImageGroup.querySelector("input[type='file']");
    if (isMerchant) {
        businessAddressGroup.style.display = "block";
        businessAddressInput.required = true;
        storeImageGroup.style.display = "block";
        storeImageInput.required = true;
    } else {
        businessAddressGroup.style.display = "none";
        businessAddressInput.required = false;
        businessAddressInput.value = "";
        storeImageGroup.style.display = "none";
        storeImageInput.required = false;
    }
}

signupUserRole.addEventListener("click", () => setSignupRole("user"));
signupMerchantRole.addEventListener("click", () => setSignupRole("merchant"));

document.querySelectorAll(".eye-toggle").forEach((button) => {
    button.addEventListener("click", () => {
        const passwordLine = button.closest(".password-line");
        const input = passwordLine.querySelector(".password-input");
        const isVisible = input.type === "text";

        input.type = isVisible ? "password" : "text";
        button.classList.toggle("is-visible", !isVisible);
        button.setAttribute("aria-label", isVisible ? "Show password" : "Hide password");
        button.dataset.visible = String(!isVisible);

        passwordLine.classList.remove("visibility-pulse");
        void passwordLine.offsetWidth;
        passwordLine.classList.add("visibility-pulse");

        setTimeout(() => {
            passwordLine.classList.remove("visibility-pulse");
        }, 340);
    });
});
</script>
</body>
</html>
