<!-- Restaurants Near You Component -->
<style>
.restaurants-component {
    margin-top: 6px;
    padding-bottom: 14px;
}

.restaurants-component .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 12px;
}

.restaurants-component .section-head h3 {
    margin: 0;
    font-size: 19px;
    letter-spacing: -.3px;
    color: #f7f8fb;
}

.restaurants-component .section-head a {
    color: #c3c8d4;
    text-decoration: none;
    font-size: 13px;
    font-weight: 800;
}

.restaurants-component .restaurant-list {
    display: grid;
    gap: 10px;
}

.restaurants-component .restaurant-card {
    display: grid;
    grid-template-columns: 54px 1fr auto;
    align-items: center;
    gap: 12px;
    min-height: 74px;
    padding: 10px;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 18px;
    background:
        radial-gradient(circle at 85% 30%, rgba(255,116,38,.08), transparent 28%),
        rgba(255,255,255,.045);
    cursor: pointer;
    animation: restaurantSlideIn .45s cubic-bezier(.2, .85, .25, 1) both;
    transition:
        transform .18s ease,
        border-color .18s ease,
        background .18s ease,
        box-shadow .18s ease;
}

.restaurants-component .restaurant-card:nth-child(2) {
    animation-delay: .08s;
}

.restaurants-component .restaurant-card:nth-child(3) {
    animation-delay: .16s;
}

.restaurants-component .restaurant-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,116,38,.40);
    background:
        radial-gradient(circle at 85% 30%, rgba(255,116,38,.12), transparent 30%),
        rgba(255,255,255,.06);
    box-shadow:
        0 12px 24px rgba(0,0,0,.24),
        0 0 18px rgba(255,116,38,.08);
}

.restaurants-component .restaurant-card:active {
    transform: scale(.98);
}

.restaurants-component .restaurant-logo {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    overflow: hidden;
    display: grid;
    place-items: center;
    box-shadow: 0 8px 16px rgba(0,0,0,.28);
    background: #ffffff;
}

.restaurants-component .restaurant-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.restaurants-component .restaurant-logo.palmyra img {
    object-fit: contain;
    padding: 3px;
    background: #ffffff;
}

.restaurants-component .restaurant-info {
    min-width: 0;
}

.restaurants-component .restaurant-info h4 {
    margin: 0 0 4px;
    color: #f7f8fb;
    font-size: 15.5px;
    line-height: 1.1;
    font-weight: 900;
}

.restaurants-component .restaurant-info p {
    margin: 0 0 4px;
    color: #a3a9ba;
    font-size: 12px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.restaurants-component .restaurant-info small {
    display: block;
    color: #747b8d;
    font-size: 11px;
    line-height: 1.2;
}

.restaurants-component .view-voucher-btn {
    height: 34px;
    padding: 0 13px;
    border-radius: 999px;
    border: 1px solid #ff7426;
    background: rgba(255,116,38,.08);
    color: #ff7426;
    font-size: 11.5px;
    font-weight: 900;
    white-space: nowrap;
    cursor: pointer;
    transition:
        transform .18s ease,
        background .18s ease,
        color .18s ease,
        box-shadow .18s ease;
}

.restaurants-component .view-voucher-btn:hover {
    background: #ff7426;
    color: #ffffff;
    box-shadow: 0 8px 18px rgba(255,116,38,.20);
}

.restaurants-component .view-voucher-btn:active {
    transform: scale(.94);
}

@keyframes restaurantSlideIn {
    from {
        opacity: 0;
        transform: translateY(14px);
        filter: blur(3px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
}

/* =========================
   Restaurants Near You Animation Polish
========================= */

.restaurants-component .restaurant-card {
    animation:
        restaurantSlideIn .48s cubic-bezier(.2, .85, .25, 1) both,
        restaurantSoftFloat 5.8s ease-in-out 1s infinite !important;
}

.restaurants-component .restaurant-card:nth-child(2) {
    animation-delay: .08s, 1.25s !important;
}

.restaurants-component .restaurant-card:nth-child(3) {
    animation-delay: .16s, 1.5s !important;
}

.restaurants-component .restaurant-card:hover {
    transform: translateY(-4px) scale(1.01) !important;
}

.restaurants-component .restaurant-logo {
    transition:
        transform .22s ease,
        box-shadow .22s ease,
        filter .22s ease;
}

.restaurants-component .restaurant-card:hover .restaurant-logo {
    transform: scale(1.06) rotate(-1.5deg);
    filter: brightness(1.05);
    box-shadow:
        0 10px 20px rgba(0,0,0,.32),
        0 0 16px rgba(255,116,38,.10);
}

.restaurants-component .restaurant-card:hover .restaurant-info h4 {
    color: #ffffff;
}

.restaurants-component .restaurant-card:hover .view-voucher-btn {
    transform: translateX(1px);
}

.restaurants-component .view-voucher-btn {
    position: relative;
    overflow: hidden;
}

.restaurants-component .view-voucher-btn::after {
    content: "";
    position: absolute;
    top: -20%;
    left: -40%;
    width: 30%;
    height: 140%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.34),
        transparent
    );
    transform: skewX(-18deg);
    opacity: 0;
}

.restaurants-component .restaurant-card:hover .view-voucher-btn::after {
    animation: restaurantButtonShine .7s ease;
}

@keyframes restaurantSoftFloat {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-2px);
    }
}

@keyframes restaurantButtonShine {
    0% {
        left: -45%;
        opacity: 0;
    }
    30% {
        opacity: 1;
    }
    100% {
        left: 115%;
        opacity: 0;
    }
}

</style>

<section class="restaurants-component">
    <div class="section-head">
        <h3>Restaurants Near You</h3>
        <a href="/voucher">See All ›</a>
    </div>

    <section class="restaurant-list">
        <article class="restaurant-card" onclick="window.window.openVoucherModal('mcdonalds');">
            <div class="restaurant-logo">
                <img src="/assets/mcdonalds-logo.png" alt="McDonald's logo">
            </div>

            <div class="restaurant-info">
                <h4>McDonald's</h4>
                <p>15% OFF Total Bill</p>
                <small>📍 1.2 km away</small>
            </div>

            <button class="view-voucher-btn" type="button" onclick="event.stopPropagation(); window.window.openVoucherModal('mcdonalds');">
                View
            </button>
        </article>

        <article class="restaurant-card" onclick="window.window.openVoucherModal('boost');">
            <div class="restaurant-logo">
                <img src="/assets/boost-logo.png" alt="Boost logo">
            </div>

            <div class="restaurant-info">
                <h4>Boost</h4>
                <p>10% OFF Smoothies</p>
                <small>📍 1.6 km away</small>
            </div>

            <button class="view-voucher-btn" type="button" onclick="event.stopPropagation(); window.window.openVoucherModal('boost');">
                View
            </button>
        </article>

        <article class="restaurant-card" onclick="window.window.openVoucherModal('palmyra');">
            <div class="restaurant-logo palmyra">
                <img src="/assets/palmyra-logo.png" alt="Palmyra logo">
            </div>

            <div class="restaurant-info">
                <h4>Palmyra</h4>
                <p>12% OFF Total Bill</p>
                <small>📍 2.0 km away</small>
            </div>

            <button class="view-voucher-btn" type="button" onclick="event.stopPropagation(); window.window.openVoucherModal('palmyra');">
                View
            </button>
        </article>
    </section>
</section>
