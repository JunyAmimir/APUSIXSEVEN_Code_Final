<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouchr - Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
:root {
    --orange: #ff7426;
    --bg: #25282f;
    --phone: #060a0f;
    --line: rgba(255,255,255,.12);
    --text: #f7f8fb;
    --muted: #a3a9ba;
    --muted-2: #747b8d;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
}

.stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 14px;
}

.phone {
    width: 330px;
    height: 708px;
    border-radius: 18px;
    background:
        radial-gradient(circle at 82% 8%, rgba(255,116,38,.18), transparent 28%),
        radial-gradient(circle at 14% 42%, rgba(255,116,38,.08), transparent 30%),
        linear-gradient(180deg, #081018 0%, #04070b 100%);
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 24px 50px rgba(0,0,0,.35);
}

.content {
    height: 100%;
    overflow-y: auto;
    padding: 24px 14px 88px;
    scrollbar-width: none;
}

.content::-webkit-scrollbar {
    display: none;
}

.map-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp .45s ease both;
}

.map-header h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: -.5px;
}

.search-icon {
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--orange);
    background: rgba(255,255,255,.035);
}

.search-icon svg {
    width: 19px;
    height: 19px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.search-box {
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255,255,255,.045);
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 0 13px;
    margin-bottom: 14px;
    animation: fadeUp .45s ease .04s both;
}

.search-box svg {
    width: 21px;
    height: 21px;
    stroke: #aeb4c6;
    fill: none;
    stroke-width: 2.2;
}

.search-box input {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font-size: 13px;
}

.search-box input::placeholder {
    color: #8f96a8;
}

.filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
    animation: fadeUp .45s ease .08s both;
}

.filter-row::-webkit-scrollbar {
    display: none;
}

.filter-chip {
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 999px;
    background: rgba(255,255,255,.055);
    color: #c5cad6;
    height: 32px;
    padding: 0 12px;
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease, border-color .18s ease;
}

.filter-chip.active {
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 8px 18px rgba(255,116,38,.18);
}

.filter-chip:active {
    transform: scale(.95);
}

.map-shell {
    position: relative;
    height: 430px;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.11);
    background: #0b121a;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 16px 34px rgba(0,0,0,.25);
    animation: fadeUp .45s ease .12s both;
}

#dealMap {
    width: 100%;
    height: 100%;
    background: #0b121a;
}

/* Darken normal OpenStreetMap tiles so they fit the app theme */
.leaflet-tile {
    filter: invert(1) hue-rotate(175deg) brightness(.56) contrast(1.08) saturate(.70);
}

.leaflet-control-attribution {
    display: none;
}

.leaflet-control-zoom {
    border: 0 !important;
    box-shadow: 0 10px 24px rgba(0,0,0,.28) !important;
}

.leaflet-control-zoom a {
    width: 31px !important;
    height: 31px !important;
    line-height: 31px !important;
    background: rgba(7,12,18,.90) !important;
    color: var(--orange) !important;
    border: 1px solid rgba(255,255,255,.09) !important;
}

.deal-pin {
    width: 54px;
    height: 65px;
    position: relative;
    transform: translate(-27px, -60px);
}

.deal-pin .pin-body {
    width: 48px;
    height: 48px;
    margin: 0 auto;
    border-radius: 50% 50% 50% 0;
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    transform: rotate(-45deg);
    border: 2px solid rgba(255,255,255,.82);
    box-shadow:
        0 10px 18px rgba(0,0,0,.35),
        0 0 18px rgba(255,116,38,.22);
    display: grid;
    place-items: center;
}

.deal-pin .pin-body img {
    width: 34px;
    height: 34px;
    object-fit: cover;
    border-radius: 10px;
    transform: rotate(45deg);
    background: #fff;
}

.deal-pin.contain .pin-body img {
    object-fit: contain;
    padding: 3px;
}

.deal-pin .pin-shadow {
    width: 22px;
    height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,.38);
    margin: -1px auto 0;
    filter: blur(.3px);
}

.user-marker {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(45,133,255,.22);
    border: 1px solid rgba(45,133,255,.30);
    display: grid;
    place-items: center;
    transform: translate(-17px, -17px);
}

.user-marker::after {
    content: "";
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #2d85ff;
    border: 3px solid #fff;
    box-shadow: 0 0 18px rgba(45,133,255,.70);
}

.locate-btn {
    position: absolute;
    right: 14px;
    bottom: 128px;
    z-index: 600;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.12);
    color: #fff;
    background: rgba(7,12,18,.88);
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(0,0,0,.35);
}

.locate-btn svg {
    width: 21px;
    height: 21px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.3;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.selected-card {
    position: absolute;
    left: 13px;
    right: 13px;
    bottom: 13px;
    z-index: 650;
    min-height: 105px;
    border-radius: 19px;
    border: 1px solid rgba(255,255,255,.12);
    background:
        radial-gradient(circle at 84% 20%, rgba(255,116,38,.10), transparent 30%),
        rgba(7,12,18,.93);
    backdrop-filter: blur(16px);
    padding: 12px;
    display: grid;
    grid-template-columns: 62px 1fr;
    gap: 12px;
    box-shadow: 0 16px 32px rgba(0,0,0,.38);
}

.selected-logo {
    width: 62px;
    height: 62px;
    border-radius: 15px;
    background: #fff;
    overflow: hidden;
    display: grid;
    place-items: center;
}

.selected-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.selected-logo.contain img {
    object-fit: contain;
    padding: 5px;
}

.selected-info h3 {
    margin: 0 0 5px;
    font-size: 17px;
    line-height: 1.05;
}

.selected-info p {
    margin: 0 0 6px;
    color: var(--orange);
    font-size: 13px;
    font-weight: 900;
}

.selected-meta {
    margin-bottom: 9px;
    color: #8f96a8;
    font-size: 11.5px;
}

.selected-actions {
    display: flex;
    gap: 8px;
}

.map-btn {
    height: 34px;
    border-radius: 999px;
    border: 1px solid rgba(255,116,38,.62);
    background: rgba(255,116,38,.10);
    color: var(--orange);
    padding: 0 12px;
    font-size: 11.5px;
    font-weight: 900;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease;
}

.map-btn.primary {
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    border-color: transparent;
}

.map-btn:active {
    transform: scale(.95);
}

.bottom-nav {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 68px !important;
    padding: 4px 4px 5px;
    background:
        linear-gradient(180deg, rgba(10, 15, 22, .88), rgba(4, 7, 11, .98)) !important;
    border-top: 1px solid rgba(255,255,255,.11) !important;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    backdrop-filter: blur(10px);
    box-shadow: 0 -12px 26px rgba(0,0,0,.26);
    z-index: 900;
}

.nav-item {
    color: #8f96a8 !important;
    text-decoration: none;
    display: grid;
    place-items: center;
    gap: 3px;
    padding: 8px 0 7px;
    font-size: 10px;
    font-weight: 700;
    border-radius: 14px;
    transition:
        color .18s ease,
        transform .18s ease,
        background .18s ease,
        box-shadow .18s ease;
}

.nav-item:hover {
    background: rgba(255,255,255,.035);
}

.nav-item.active {
    color: #ff7426 !important;
    background: rgba(255,116,38,.075);
    box-shadow: inset 0 0 0 1px rgba(255,116,38,.12);
}

.nav-item:active {
    transform: scale(.94);
}

.nav-item em {
    font-style: normal;
    font-size: 10px;
    line-height: 1;
    font-weight: 800;
}

.nav-icon {
    width: 23px;
    height: 23px;
    display: block;
    background: currentColor;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-size: contain;
    mask-size: contain;
    transition: transform .2s ease;
}

.nav-item.active .nav-icon {
    transform: translateY(-1px) scale(1.05);
}

.nav-main {
    -webkit-mask-image: url("/assets/icon-main-menu.svg");
    mask-image: url("/assets/icon-main-menu.svg");
}

.nav-voucher {
    -webkit-mask-image: url("/assets/icon-voucher.svg");
    mask-image: url("/assets/icon-voucher.svg");
}

.nav-map {
    -webkit-mask-image: url("/assets/icon-map.svg");
    mask-image: url("/assets/icon-map.svg");
}

.nav-budget {
    -webkit-mask-image: url("/assets/icon-budget.svg");
    mask-image: url("/assets/icon-budget.svg");
}

.nav-profile {
    -webkit-mask-image: url("/assets/icon-profile.svg");
    mask-image: url("/assets/icon-profile.svg");
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(16px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   Smaller floating deal card + hide/show control
========================= */

.selected-card {
    left: 12px !important;
    right: 12px !important;
    bottom: 12px !important;
    min-height: 82px !important;
    border-radius: 17px !important;
    padding: 10px !important;
    grid-template-columns: 50px 1fr !important;
    gap: 10px !important;
    transition:
        transform .28s cubic-bezier(.2,.85,.25,1),
        opacity .22s ease,
        visibility .22s ease;
}

.selected-card.is-hidden {
    opacity: 0;
    visibility: hidden;
    transform: translateY(24px) scale(.96);
    pointer-events: none;
}

.selected-logo {
    width: 50px !important;
    height: 50px !important;
    border-radius: 13px !important;
}

.selected-info h3 {
    font-size: 15.5px !important;
    margin: 0 0 3px !important;
}

.selected-info p {
    font-size: 12px !important;
    margin: 0 0 4px !important;
}

.selected-meta {
    font-size: 10.5px !important;
    margin-bottom: 7px !important;
}

.selected-actions {
    gap: 6px !important;
}

.map-btn {
    height: 29px !important;
    padding: 0 10px !important;
    font-size: 10.5px !important;
}

.deal-card-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    color: #cfd5e2;
    display: grid;
    place-items: center;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    transition: background .18s ease, color .18s ease, transform .18s ease;
}

.deal-card-close:hover {
    background: rgba(255,116,38,.13);
    color: #ff7426;
}

.deal-card-close:active {
    transform: scale(.92);
}

.show-deal-card {
    position: absolute;
    left: 13px;
    bottom: 14px;
    z-index: 650;
    height: 36px;
    border: 1px solid rgba(255,116,38,.42);
    border-radius: 999px;
    background:
        radial-gradient(circle at 80% 20%, rgba(255,116,38,.18), transparent 36%),
        rgba(7,12,18,.92);
    color: #ff7426;
    padding: 0 13px;
    font-size: 11.5px;
    font-weight: 900;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 7px;
    backdrop-filter: blur(14px);
    box-shadow: 0 12px 24px rgba(0,0,0,.32);
}

.show-deal-card.active {
    display: inline-flex;
}

.deal-cycle-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ff7426;
    box-shadow: 0 0 12px rgba(255,116,38,.55);
}

.locate-btn {
    bottom: 106px !important;
}

@media (max-width: 430px) {
    .selected-card {
        min-height: 80px !important;
    }
}


/* Map header cleanup */
.map-header {
    justify-content: flex-start !important;
}


/* =========================
   Map Voucher Popup Recovery
========================= */

#vouchrFallbackVoucherOverlay {
    position: absolute;
    inset: 0;
    z-index: 980;
    display: none;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,.62);
    backdrop-filter: blur(9px);
    pointer-events: auto;
}

#vouchrFallbackVoucherOverlay.active {
    display: flex;
}

.vouchr-fallback-sheet {
    width: 100%;
    max-height: 76%;
    overflow-y: auto;
    border-radius: 26px 26px 0 0;
    border: 1px solid rgba(255,255,255,.14);
    border-bottom: 0;
    background:
        radial-gradient(circle at 86% 8%, rgba(255,116,38,.16), transparent 28%),
        linear-gradient(180deg, #111821 0%, #070b11 100%);
    box-shadow: 0 -22px 46px rgba(0,0,0,.52);
    padding: 14px 16px 24px;
    animation: vouchrFallbackUp .26s cubic-bezier(.2,.85,.25,1) both;
}

.vouchr-fallback-handle {
    width: 46px;
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,.24);
    margin: 0 auto 14px;
}

.vouchr-fallback-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
}

.vouchr-fallback-logo {
    width: 62px;
    height: 62px;
    border-radius: 17px;
    overflow: hidden;
    background: #fff;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    box-shadow: 0 10px 20px rgba(0,0,0,.30);
}

.vouchr-fallback-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.vouchr-fallback-logo.contain img {
    object-fit: contain;
    padding: 5px;
}

.vouchr-fallback-info {
    flex: 1;
    min-width: 0;
}

.vouchr-fallback-info h2 {
    margin: 2px 0 5px;
    font-size: 20px;
    line-height: 1.1;
    color: #f7f8fb;
}

.vouchr-fallback-info p {
    margin: 0;
    color: #ff7426;
    font-size: 13px;
    font-weight: 900;
    line-height: 1.3;
}

.vouchr-fallback-close {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex: 0 0 auto;
}

.vouchr-fallback-card {
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 18px;
    background: rgba(255,255,255,.045);
    padding: 13px;
    margin-bottom: 10px;
}

.vouchr-fallback-card h3 {
    margin: 0 0 7px;
    font-size: 14px;
}

.vouchr-fallback-card p,
.vouchr-fallback-card li {
    color: #a3a9ba;
    font-size: 12.5px;
    line-height: 1.45;
}

.vouchr-fallback-card p {
    margin: 0;
}

.vouchr-fallback-card ul {
    margin: 0;
    padding-left: 18px;
}

.vouchr-fallback-actions {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 10px;
    padding-bottom: 2px;
}

.vouchr-fallback-redeem,
.vouchr-fallback-save {
    height: 46px;
    border-radius: 15px;
    font-size: 13px;
    font-weight: 950;
    cursor: pointer;
}

.vouchr-fallback-redeem {
    border: 0;
    background: linear-gradient(145deg, #ff8a24, #f25a0b);
    color: #fff;
    box-shadow: 0 12px 24px rgba(255,116,38,.22);
}

.vouchr-fallback-save {
    border: 1px solid rgba(255,116,38,.50);
    background: rgba(255,116,38,.06);
    color: #ff7426;
}

.map-voucher-card,
.map-voucher-card button,
.map-card,
.map-card button,
.view-voucher-btn,
#viewVoucherBtn,
[data-map-view-voucher] {
    pointer-events: auto !important;
    cursor: pointer !important;
}

@keyframes vouchrFallbackUp {
    from {
        opacity: 0;
        transform: translateY(42px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


/* =========================
   Map Budget Button Replacement
   Budget is now a real button, not a link.
========================= */

.bottom-nav button.nav-item {
    border: 0;
    font-family: inherit;
    background: transparent;
    cursor: pointer;
}

.map-budget-button {
    pointer-events: auto !important;
    position: relative !important;
    z-index: 99999 !important;
    touch-action: manipulation;
}

.map-budget-button .nav-icon,
.map-budget-button em {
    pointer-events: none;
}

<script>
const deals = [
    {
        id: "mcdonalds",
        name: "McDonald's",
        offer: "15% OFF Total Bill",
        category: "food",
        type: "Fast Food",
        distance: "1.2 km away",

    },
    {
        id: "boost",
        name: "Boost",
        offer: "10% OFF Smoothies",
        category: "drinks",
        type: "Beverages",
        distance: "1.6 km away",
        lat: 3.1295,
        lng: 101.7245,
        logo: "/assets/boost-logo.png",
        containLogo: false
    },
    {
        id: "palmyra",
        name: "Palmyra",
        offer: "12% OFF Total Bill",
        category: "food",
        type: "Oriental Cuisine",
        distance: "2.0 km away",
        lat: 3.1288,
        lng: 101.6755,
        logo: "/assets/palmyra-logo.png",

    },
    {
        id: "good-burger",
        name: "The Good Burger",
        offer: "30% OFF Total Bill",
        category: "food",
        type: "Burgers",
        distance: "2.3 km away",

    },
    {
        id: "pastamania",

        type: "Café",
        distance: "1.9 km away",
        lat: 3.1462,
        lng: 101.7117,

    },
    {

        containLogo: false

];

let selectedDeal = deals[0];
let activeFilter = "all";
let visibleDealIds = deals.map((deal) => deal.id);
let selectedIndex = 0;
let dealCardHidden = false;
let lastUserInteraction = Date.now();
const markers = new Map();

const map = L.map("dealMap", {
    zoomControl: true,
    attributionControl: false
}).setView([3.1325, 101.6990], 13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
}).addTo(map);

const userIcon = L.divIcon({
    className: "",
    html: '<div class="user-marker"></div>',
    iconSize: [34, 34],
    iconAnchor: [17, 17]
});

L.marker([3.1319, 101.6970], { icon: userIcon }).addTo(map);

function createDealIcon(deal) {
    return L.divIcon({
        className: "",
        html: `
            <div class="deal-pin ${deal.containLogo ? "contain" : ""}">
                <div class="pin-body">
                    <img src="${deal.logo}" alt="${deal.name}">
                </div>
                <div class="pin-shadow"></div>
            </div>
        `,
        iconSize: [54, 65],
        iconAnchor: [27, 60]
    });
}

function addMarkers() {
    deals.forEach((deal) => {
        const marker = L.marker([deal.lat, deal.lng], {
            icon: createDealIcon(deal)
        }).addTo(map);

        marker.on("click", () => {
            markMapInteraction();
            selectDeal(deal.id, true);
            showDealCard();
        });

        markers.set(deal.id, marker);
    });
}

function selectDeal(dealId, panToMarker = false) {
    const found = deals.find((deal) => deal.id === dealId);
    if (!found) return;

    selectedDeal = found;
    selectedIndex = Math.max(0, visibleDealIds.indexOf(selectedDeal.id));

    document.getElementById("selectedLogo").src = selectedDeal.logo;
    document.getElementById("selectedLogo").alt = selectedDeal.name + " logo";
    document.getElementById("selectedLogoWrap").classList.toggle("contain", selectedDeal.containLogo);
    document.getElementById("selectedName").textContent = selectedDeal.name;
    document.getElementById("selectedOffer").textContent = selectedDeal.offer;
    document.getElementById("selectedMeta").textContent = "📍 " + selectedDeal.distance + " · " + selectedDeal.type;

    if (panToMarker) {
        map.panTo([selectedDeal.lat, selectedDeal.lng], {
            animate: true,
            duration: .8
        });
    }
}

function applyFilter() {
    const searchValue = document.getElementById("mapSearch").value.trim().toLowerCase();
    visibleDealIds = [];

    deals.forEach((deal) => {
        const marker = markers.get(deal.id);
        const matchesFilter = activeFilter === "all" || deal.category === activeFilter;
        const matchesSearch = [deal.name, deal.offer, deal.type, deal.distance]
            .join(" ")
            .toLowerCase()
            .includes(searchValue);

        if (matchesFilter && matchesSearch) {
            visibleDealIds.push(deal.id);

            if (!map.hasLayer(marker)) {
                marker.addTo(map);
            }
        } else {
            if (map.hasLayer(marker)) {
                marker.remove();
            }
        }
    });

    if (visibleDealIds.length && !visibleDealIds.includes(selectedDeal.id)) {
        selectDeal(visibleDealIds[0], true);
    }
}

function loadHtmlComponent(mountId, url, fallbackText) {
    const mount = document.getElementById(mountId);
    if (!mount) return Promise.resolve();

    return fetch(url)
        .then((response) => {
            if (!response.ok) {
                throw new Error(url + " failed to load");
            }
            return response.text();
        })
        .then((html) => {
            mount.innerHTML = html;

            mount.querySelectorAll("script").forEach((oldScript) => {
                const newScript = document.createElement("script");

                Array.from(oldScript.attributes).forEach((attr) => {
                    newScript.setAttribute(attr.name, attr.value);
                });

                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        })
        .catch(() => {
            mount.innerHTML = "<p style='color:#a3a9ba;font-size:12px;'>" + fallbackText + "</p>";
        });
}


function markMapInteraction() {
    lastUserInteraction = Date.now();
}

function hideDealCard() {
    dealCardHidden = true;
    document.getElementById("selectedDealCard").classList.add("is-hidden");
    document.getElementById("showDealCardBtn").classList.add("active");
    markMapInteraction();
}

function showDealCard() {
    dealCardHidden = false;
    document.getElementById("selectedDealCard").classList.remove("is-hidden");
    document.getElementById("showDealCardBtn").classList.remove("active");
    markMapInteraction();
}

function cycleToNextDeal() {
    if (dealCardHidden || !visibleDealIds.length) return;

    const idleTime = Date.now() - lastUserInteraction;

    if (idleTime < 5500) return;

    selectedIndex = (selectedIndex + 1) % visibleDealIds.length;
    selectDeal(visibleDealIds[selectedIndex], true);
}

setInterval(cycleToNextDeal, 6500);

map.on("dragstart zoomstart click", markMapInteraction);

document.getElementById("dealCardClose").addEventListener("click", (event) => {
    event.stopPropagation();
    hideDealCard();
});

document.getElementById("showDealCardBtn").addEventListener("click", showDealCard);

document.getElementById("viewVoucherBtn").addEventListener("click", () => {
    markMapInteraction();

    if (typeof window.openVoucherModal === "function") {
        window.openVoucherModal(selectedDeal.id);
    }
});

document.getElementById("directionBtn").addEventListener("click", () => {
    markMapInteraction();

    const url = `https://www.google.com/maps/search/?api=1&query=${selectedDeal.lat},${selectedDeal.lng}`;
    window.open(url, "_blank");
});

document.getElementById("locateBtn").addEventListener("click", () => {
    markMapInteraction();

    map.panTo([3.1319, 101.6970], {
        animate: true,
        duration: .45
    });
});

document.getElementById("mapSearch").addEventListener("input", () => {
    markMapInteraction();
    applyFilter();
});

document.querySelectorAll(".filter-chip").forEach((chip) => {
    chip.addEventListener("click", () => {
        markMapInteraction();
        document.querySelectorAll(".filter-chip").forEach((item) => item.classList.remove("active"));
        chip.classList.add("active");
        activeFilter = chip.dataset.filter;
        applyFilter();
    });
});

addMarkers();
selectDeal("mcdonalds");

loadHtmlComponent("voucherModalMount", "/assets/voucher_modal_component.html", "Voucher popup could not load.");
</script>

<script>

(function () {

        return String(value || "")
            .replaceAll("&", "&amp;")

            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");

    function getDeals() {
        if (Array.isArray(window.deals)) return window.deals;
        if (typeof deals !== "undefined" && Array.isArray(deals)) return deals;

            </div>
        `;

        overlay.classList.add("active");

    window.openMapDealVoucher = openDealPopup;

    // Replace View Voucher behavior directly.
    function bindViewButton() {
        const button = document.getElementById("viewVoucherBtn");
        if (!button || button.dataset.mapPopupFixed === "true") return;

        button.dataset.mapPopupFixed = "true";

        button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            openDealPopup(getSelectedDeal());
        }, true);
    }

    bindViewButton();
    setTimeout(bindViewButton, 500);

    // Make clicking the map logo/pin select and open the voucher.
    // Leaflet markers are generated dynamically, so use event delegation.
    document.addEventListener("click", function (event) {
        const pin = event.target.closest(".deal-pin, .deal-pin img, .pin-body");

        if (!pin) return;

        setTimeout(function () {
            openDealPopup(getSelectedDeal());
        }, 80);
    }, true);
})();
</script>
<script>
/* =====================================================
   Universal QR Redemption Modal + Close QR Code Button
   - QR stays inside the .phone frame
   - X closes only the QR page and keeps alert bar active
   - Close QR Code clears QR session and hides alert bar
===================================================== */
(function () {
    const existingOverlay = document.getElementById("qrRedemptionOverlay");
    const existingBar = document.getElementById("activeQrBar");
    if (existingOverlay) existingOverlay.remove();
    if (existingBar) existingBar.remove();

    const phoneContainer = document.querySelector(".phone") || document.body;

    const style = document.createElement("style");
    style.innerHTML = `
        #qrRedemptionOverlay {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            overflow: hidden !important;
            background: rgba(0,0,0,.84);
            backdrop-filter: blur(10px);
            z-index: 9999999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity .30s ease, visibility 0s linear .30s;
        }
        #qrRedemptionOverlay.active { opacity: 1; visibility: visible; pointer-events: auto; transition-delay: 0s; }
        .qr-redemption-sheet {
            width: min(280px, calc(100% - 22px));
            max-height: calc(100% - 34px);
            overflow: auto;
            scrollbar-width: none;
            position: relative;
            text-align: center;
            padding: 58px 20px 22px;
            border-radius: 28px;
            border: 1px solid rgba(255,116,38,.42);
            background: radial-gradient(circle at 88% 10%, rgba(255,116,38,.12), transparent 28%), #15171e;
            box-shadow: 0 25px 50px rgba(0,0,0,.60), 0 0 30px rgba(255,116,38,.15);
            transform: translateY(24px) scale(.98);
            opacity: .92;
            transition: transform .34s cubic-bezier(.2,.85,.25,1), opacity .28s ease;
        }
        .qr-redemption-sheet::-webkit-scrollbar { display: none; }
        #qrRedemptionOverlay.active .qr-redemption-sheet { transform: translateY(0) scale(1); opacity: 1; }
        .qr-close-btn, .qr-clear-btn {
            position: absolute; top: 12px; height: 32px; border: 0; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
        }
        .qr-close-btn {
            right: 12px; width: 32px; border-radius: 50%; background: rgba(255,255,255,.10);
            color: #fff; font-size: 22px; line-height: 1;
        }
        .qr-clear-btn {
            left: 12px; padding: 0 10px; border-radius: 999px; border: 1px solid rgba(255,116,38,.65);
            background: rgba(255,116,38,.11); color: #ff7426; font-size: 10.5px; font-weight: 900;
            letter-spacing: .1px; box-shadow: 0 0 14px rgba(255,116,38,.10);
        }
        .qr-close-btn:hover { background: rgba(255,116,38,.18); }
        .qr-clear-btn:hover { background: rgba(255,116,38,.18); box-shadow: 0 0 18px rgba(255,116,38,.18); }
        .qr-close-btn:active, .qr-clear-btn:active { transform: scale(.95); }
        .qr-redemption-sheet h3 { margin: 0 0 5px; color: #fff; font-size: 20px; font-weight: 900; }
        .qr-redemption-sheet p { margin: 0 0 20px; color: #8a8d93; font-size: 13px; font-weight: 700; }
        .qr-box {
            width: 200px; height: 200px; position: relative; display: inline-block; margin-bottom: 18px; padding: 15px;
            border-radius: 18px; background: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,.10);
        }
        #qrImage { width: 100%; height: 100%; object-fit: contain; transition: filter .3s ease, opacity .3s ease; }
        #qrImage.expired, #qrImage.erased { opacity: .15; filter: grayscale(100%); }
        #qrExpiredMsg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; display: none;
            color: #ef4444; font-size: 18px; font-weight: 900; text-align: center;
        }
        .qr-timer { margin-bottom: 5px; color: #ff7426; font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
        .qr-warning { margin: 0 !important; color: #8a8d93 !important; font-size: 11.5px !important; }
        #activeQrBar {
            position: absolute; left: 14px; right: 14px; bottom: 76px; z-index: 9999995; display: none;
            justify-content: space-between; align-items: center; min-height: 38px; padding: 8px 12px; color: #fff;
            background: radial-gradient(circle at 10% 50%, rgba(255,255,255,.18), transparent 30%), linear-gradient(145deg, #ff8a24, #f25a0b);
            border: 1px solid rgba(255,255,255,.24); border-radius: 13px;
            box-shadow: 0 10px 24px rgba(0,0,0,.34), 0 0 18px rgba(255,116,38,.22);
            backdrop-filter: blur(8px); cursor: pointer; font-size: 12.5px; font-weight: 900;
            transition: top .4s cubic-bezier(.2,.85,.25,1), bottom .4s cubic-bezier(.2,.85,.25,1), left .4s cubic-bezier(.2,.85,.25,1), right .4s cubic-bezier(.2,.85,.25,1), border-radius .4s cubic-bezier(.2,.85,.25,1), box-shadow .4s cubic-bezier(.2,.85,.25,1), transform .18s ease;
        }
        #activeQrBar.active { display: flex; animation: qrBarIn .25s cubic-bezier(.2,.85,.25,1) both; }
        #activeQrBar:active { transform: scale(.97); }
        #activeQrBar.fly-top,
        .phone:has(#voucherModal.active) #activeQrBar,
        .phone:has(.category-overlay.active) #activeQrBar,
        .phone:has(#vouchrFallbackVoucherOverlay.active) #activeQrBar,
        .phone:has(#mapDealPopupOverlay.active) #activeQrBar,
        .phone:has(#restaurantVoucherOverlay.active) #activeQrBar,
        .phone:has(.search-results-overlay.active) #activeQrBar,
        .phone:has(.ai-overlay.active) #activeQrBar,
        .phone:has(.header-popover.active) #activeQrBar,
        .phone:has(.clean-modal-overlay.active) #activeQrBar {
            top: 14px !important; bottom: auto !important; left: 14px !important; right: 14px !important;
            border-radius: 14px !important; border: 1px solid rgba(255,255,255,.30) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,.60), 0 0 20px rgba(255,116,38,.40) !important;
        }
        .qr-bar-pulse { width: 8px; height: 8px; margin-right: 8px; border-radius: 50%; display: inline-block; background: #fff; animation: qrPulse 1.5s infinite; }
        @keyframes qrPulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,.7); } 70% { box-shadow: 0 0 0 6px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
        @keyframes qrBarIn { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    `;
    document.head.appendChild(style);

    const qrBar = document.createElement("div");
    qrBar.id = "activeQrBar";
    qrBar.innerHTML = `<div style="display:flex; align-items:center; min-width:0; overflow:hidden;"><span class="qr-bar-pulse"></span><span id="activeQrBarLabel" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Active Voucher</span></div><span id="activeQrBarTimer" style="font-variant-numeric: tabular-nums; font-size:14px; margin-left:10px;">05:00</span>`;
    phoneContainer.appendChild(qrBar);

    const overlay = document.createElement("div");
    overlay.id = "qrRedemptionOverlay";
    overlay.setAttribute("aria-hidden", "true");
    overlay.innerHTML = `<div class="qr-redemption-sheet" role="dialog" aria-modal="true" aria-labelledby="qrVoucherTitle"><button class="qr-clear-btn" id="qrClearBtn" type="button">Close QR Code</button><button class="qr-close-btn" id="qrCloseBtn" type="button" aria-label="Close QR code">×</button><h3 id="qrVoucherTitle">Scan to Redeem</h3><p id="qrVoucherSubtitle">Show this code to the cashier</p><div class="qr-box"><img id="qrImage" src="" alt="QR Code"><div id="qrExpiredMsg">EXPIRED</div></div><div class="qr-timer" id="qrTimer">05:00</div><p class="qr-warning">Code expires in 5 minutes for security.</p></div>`;
    phoneContainer.appendChild(overlay);

    const qrImage = document.getElementById("qrImage");
    const qrTimer = document.getElementById("qrTimer");
    const expiredMsg = document.getElementById("qrExpiredMsg");
    const qrBarTimer = document.getElementById("activeQrBarTimer");
    const qrBarLabel = document.getElementById("activeQrBarLabel");
    const qrVoucherTitle = document.getElementById("qrVoucherTitle");
    const qrVoucherSubtitle = document.getElementById("qrVoucherSubtitle");
    let tickInterval = null;

    function safeTitle(text) { return String(text || "Voucher").trim().replace(/\s+/g, " ") || "Voucher"; }
    function makeQrPayload(voucherName, voucherDiscount) { const uniqueString = Math.random().toString(36).substring(2, 10); return encodeURIComponent(`vouchr-redeem|${voucherName}|${voucherDiscount || "Redeem Voucher"}|${uniqueString}`); }
    function showBar() { qrBar.classList.add("active"); qrBar.style.display = "flex"; }
    function hideBar() { qrBar.classList.remove("active", "fly-top"); qrBar.style.display = "none"; }
    function closeModalOnly() { overlay.classList.remove("active"); overlay.setAttribute("aria-hidden", "true"); }
    function clearQR() {
        sessionStorage.removeItem("vouchr_qr_data"); sessionStorage.removeItem("vouchr_qr_name"); sessionStorage.removeItem("vouchr_qr_discount"); sessionStorage.removeItem("vouchr_qr_end");
        clearInterval(tickInterval); tickInterval = null; closeModalOnly(); hideBar();
        qrImage.classList.add("erased"); expiredMsg.style.display = "none"; qrTimer.style.color = "#ef4444"; qrTimer.textContent = "--:--";
    }
    function startQR(voucherName, voucherDiscount) {
        const name = safeTitle(voucherName); const discount = safeTitle(voucherDiscount || "Redeem Voucher");
        const qrData = makeQrPayload(name, discount); const endTime = Date.now() + (5 * 60 * 1000);
        sessionStorage.setItem("vouchr_qr_data", qrData); sessionStorage.setItem("vouchr_qr_name", name); sessionStorage.setItem("vouchr_qr_discount", discount); sessionStorage.setItem("vouchr_qr_end", String(endTime));
        checkActiveQR(); openModal();
    }
    function openModal() {
        const endTime = sessionStorage.getItem("vouchr_qr_end"); const qrData = sessionStorage.getItem("vouchr_qr_data"); const vName = sessionStorage.getItem("vouchr_qr_name"); const discount = sessionStorage.getItem("vouchr_qr_discount");
        if (!endTime || !qrData) return;
        qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + qrData;
        qrVoucherTitle.textContent = vName || "Scan to Redeem";
        qrVoucherSubtitle.textContent = discount && discount !== "Redeem Voucher" ? `${discount} · Show this code to the cashier` : "Show this code to the cashier";
        if (Date.now() > parseInt(endTime, 10)) { showExpired(); } else { qrImage.classList.remove("expired", "erased"); expiredMsg.style.display = "none"; qrTimer.style.color = "#ff7426"; }
        overlay.classList.add("active"); overlay.setAttribute("aria-hidden", "false");
    }
    function showExpired() { qrImage.classList.add("expired"); expiredMsg.style.display = "block"; qrTimer.style.color = "#ef4444"; qrTimer.textContent = "00:00"; sessionStorage.removeItem("vouchr_qr_end"); hideBar(); }
    function checkActiveQR() { clearInterval(tickInterval); tick(); tickInterval = setInterval(tick, 1000); }
    function tick() {
        const endTimeStr = sessionStorage.getItem("vouchr_qr_end");
        if (!endTimeStr) { hideBar(); return; }
        const diff = parseInt(endTimeStr, 10) - Date.now();
        if (diff <= 0) { showExpired(); return; }
        const totalSeconds = Math.floor(diff / 1000); const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, "0"); const seconds = (totalSeconds % 60).toString().padStart(2, "0"); const timeText = `${minutes}:${seconds}`;
        const name = sessionStorage.getItem("vouchr_qr_name") || "Active Voucher";
        qrBarLabel.textContent = name.length > 20 ? name.slice(0, 19) + "…" : name; qrBarTimer.textContent = timeText; qrTimer.textContent = timeText; showBar();
    }
    function extractVoucherDetails(button) {
        const container = button.closest(".voucher-sheet, .vouchr-fallback-sheet, .restaurant-voucher-sheet, .map-deal-sheet, .modal-content, .clean-modal-sheet, .voucher, .voucher-card, .featured-card, .near-item, [data-voucher-id], [data-map-voucher-id]");
        const titleEl = container ? container.querySelector("h1, h2, h3, h4, .sheet-title h2, .selected-info h3") : null;
        const discountEl = container ? container.querySelector(".sheet-offer, .tag, .card-pill, .selected-info p") : null;
        return { name: safeTitle(button.dataset.voucherName || (titleEl && titleEl.textContent) || "Voucher"), discount: safeTitle(button.dataset.voucherDiscount || (discountEl && discountEl.textContent) || "Redeem Voucher") };
    }
    document.getElementById("qrCloseBtn").addEventListener("click", function (event) { event.preventDefault(); event.stopPropagation(); closeModalOnly(); });
    document.getElementById("qrClearBtn").addEventListener("click", function (event) { event.preventDefault(); event.stopPropagation(); clearQR(); });
    qrBar.addEventListener("click", openModal);
    document.addEventListener("click", function (event) {
        const btn = event.target.closest("button, a, .voucher-card, .featured-card, .near-item, .map-btn, #viewVoucherBtn, .view-voucher-btn");
        if (!btn || btn.closest("#qrRedemptionOverlay")) return;
        const text = (btn.textContent || "").trim().toLowerCase();
        const isRedeem = btn.classList.contains("sheet-redeem") || btn.classList.contains("vouchr-fallback-redeem") || btn.classList.contains("restaurant-voucher-redeem") || btn.classList.contains("map-deal-redeem") || text === "redeem" || text.includes("redeem voucher");
        if (isRedeem) { event.preventDefault(); event.stopPropagation(); if (event.stopImmediatePropagation) event.stopImmediatePropagation(); const details = extractVoucherDetails(btn); startQR(details.name, details.discount); return; }
        const isView = text === "view" || text.includes("view voucher") || btn.id === "viewVoucherBtn" || btn.classList.contains("view-btn");
        if (isView && qrBar.classList.contains("active")) qrBar.classList.add("fly-top");
        const isCloseDetails = btn.classList.contains("clean-close") || btn.classList.contains("vouchr-fallback-close") || btn.classList.contains("map-deal-close") || btn.classList.contains("sheet-close") || text === "×";
        if (isCloseDetails && !btn.closest("#qrRedemptionOverlay")) qrBar.classList.remove("fly-top");
    }, true);
    document.addEventListener("click", function (event) {
        if (event.target.classList && (event.target.classList.contains("clean-modal-overlay") || event.target.id === "vouchrFallbackVoucherOverlay" || event.target.id === "mapDealPopupOverlay" || event.target.classList.contains("modal-backdrop"))) qrBar.classList.remove("fly-top");
    });
    window.VouchrQR = { start: startQR, open: openModal, close: closeModalOnly, clear: clearQR, erase: clearQR };
    checkActiveQR();
})();
</script>
