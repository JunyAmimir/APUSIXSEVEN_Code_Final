<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vouchr - Welcome</title>

<style>
:root {
    --orange: #ff7426;
    --dark: #202437;
    --muted: #8b91a6;
    --page-bg: #25282f;
    --card: #ffffff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--page-bg);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--dark);
}

.stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 14px;
}

.phone {
    width: 330px;
    height: 708px;
    background: #fff;
    border-radius: 18px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 50px rgba(0, 0, 0, .35);
}

.phone.page-exit {
    animation: pageExit 0.55s ease forwards;
}

@keyframes pageExit {
    0% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
    100% {
        opacity: 0;
        transform: scale(0.96) translateY(-18px);
    }
}

/* screen switching */
.screen {
    position: absolute;
    inset: 0;
    background: #fff;
}

.splash-screen {
    z-index: 3;
    animation: hideSplash 2.9s forwards;
}

.onboarding-screen {
    z-index: 1;
    opacity: 0;
    animation: showOnboarding .7s ease 2.9s forwards;
}

@keyframes hideSplash {
    0%, 88% { opacity: 1; visibility: visible; }
    100% { opacity: 0; visibility: hidden; }
}

@keyframes showOnboarding {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Vouchr logo */
.vouchr-logo {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dark);
    font-size: 41px;
    font-weight: 900;
    letter-spacing: -2px;
    z-index: 10;
    user-select: none;
    animation: logoIn 1s ease forwards;
}

.vouchr-logo .orange {
    color: var(--orange);
}

.ticket-o {
    width: 38px;
    height: 30px;
    background: var(--orange);
    border-radius: 11px;
    color: white;
    display: grid;
    place-items: center;
    font-size: 15px;
    margin: 0 -2px;
    position: relative;
    transform: translateY(1px);
    animation: ticketBounce 0.9s cubic-bezier(.2, .9, .2, 1.25) both;
    animation-delay: 0.2s;
}

.ticket-o::before {
    content: "";
    position: absolute;
    width: 22px;
    height: 16px;
    border: 4px solid var(--orange);
    border-bottom: 0;
    border-radius: 18px 18px 0 0;
    top: -11px;
    left: 8px;
}

.speed-lines {
    position: absolute;
    width: 44px;
    height: 14px;
    left: 47px;
    bottom: -5px;
}

.speed-lines i {
    display: block;
    height: 2px;
    border-radius: 99px;
    background: var(--orange);
    margin: 3px 0;
    opacity: .75;
    transform-origin: left center;
    animation: speedLineIn 0.5s ease both;
}

.speed-lines i:nth-child(1) { width: 30px; animation-delay: 0.55s; }
.speed-lines i:nth-child(2) { width: 44px; animation-delay: 0.63s; }
.speed-lines i:nth-child(3) { width: 22px; animation-delay: 0.71s; }

@keyframes logoIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.88); }
    60% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes ticketBounce {
    0% {
        opacity: 0;
        transform: translateY(-14px) scale(0.75) rotate(-12deg);
    }
    60% {
        opacity: 1;
        transform: translateY(4px) scale(1.08) rotate(4deg);
    }
    100% {
        opacity: 1;
        transform: translateY(1px) scale(1) rotate(0deg);
    }
}

@keyframes speedLineIn {
    0% {
        opacity: 0;
        transform: scaleX(0) translateX(12px);
    }
    100% {
        opacity: 0.75;
        transform: scaleX(1) translateX(0);
    }
}

/* Splash fan animation */
.fan {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    z-index: 2;
}

.fan.top-left {
    width: 220px;
    height: 220px;
    left: -112px;
    top: -125px;
    background: repeating-conic-gradient(
        from 0deg,
        rgba(225, 229, 235, .95) 0deg 4deg,
        transparent 4deg 8deg
    );
    animation: fanTopIn 1.1s ease .55s forwards;
}

.fan.bottom-right {
    width: 310px;
    height: 310px;
    right: -132px;
    bottom: -132px;
    background: repeating-conic-gradient(
        from 0deg,
        rgba(255, 116, 38, .9) 0deg 4deg,
        transparent 4deg 8deg
    );
    animation: fanBottomIn 1.1s ease .65s forwards;
}

@keyframes fanTopIn {
    from { opacity: 0; transform: rotate(-25deg) scale(.7); }
    to { opacity: 1; transform: rotate(0deg) scale(1); }
}

@keyframes fanBottomIn {
    from { opacity: 0; transform: rotate(25deg) scale(.7); }
    to { opacity: 1; transform: rotate(0deg) scale(1); }
}

/* Onboarding page */
.onboarding-content {
    position: relative;
    height: 100%;
    padding: 0 20px;
}

.illustration-wrap {
    height: 390px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
}

.onboarding-illustration {
    width: 286px;
    height: auto;
    display: block;
    object-fit: contain;
    transition: transform 0.45s ease, opacity 0.45s ease;
    animation: softFloat 3s ease-in-out infinite;
}

.onboarding-illustration.image-changing {
    opacity: 0.72;
    transform: scale(0.96) translateY(8px);
}

@keyframes softFloat {
    0% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
    100% { transform: translateY(0); }
}

.onboard-text {
    text-align: center;
    margin-top: 4px;
    transition: opacity 0.35s ease, transform 0.35s ease;
}

.onboard-text.slide-out {
    opacity: 0;
    transform: translateY(12px);
}

.onboard-text.slide-in {
    opacity: 1;
    transform: translateY(0);
}

.onboard-text h1 {
    font-size: 22px;
    margin: 0 0 22px;
    color: #343746;
    font-weight: 900;
}

.onboard-text p {
    margin: 0 auto;
    width: 270px;
    line-height: 1.55;
    color: #8b91a6;
    font-size: 15px;
    font-weight: 600;
}

.onboard-dots {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 28px 0 34px;
}

.onboard-dots .dot {
    width: 9px;
    height: 9px;
    background: #ffd8c5;
    border-radius: 50%;
    transition: background-color 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
    opacity: 0.75;
    cursor: pointer;
}

.onboard-dots .dot.active {
    background: var(--orange);
    transform: scale(1.25);
    opacity: 1;
}

.next-btn {
    display: flex;
    width: 286px;
    height: 54px;
    margin: 0 auto 18px;
    border: 0;
    border-radius: 9px;
    background: var(--orange);
    color: white;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .3px;
    text-decoration: none;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}

.next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(255, 116, 38, 0.32);
}

.next-btn:active {
    transform: scale(0.96);
}

.skip-btn {
    display: block;
    text-align: center;
    color: #8b91a6;
    text-decoration: none;
    font-weight: 800;
    font-size: 15px;
    transition: color 0.25s ease, transform 0.18s ease;
}

.skip-btn:hover {
    color: var(--orange);
    transform: translateY(-1px);
}

.skip-btn:active {
    transform: scale(0.96);
}
</style>
</head>

<body>
<main class="stage">
    <section class="phone">

        <!-- Splash animation -->
        <section class="screen splash-screen">
            <div class="fan top-left"></div>
            <div class="fan bottom-right"></div>

            <div class="vouchr-logo">
                <span>V</span>
                <span class="orange">o</span>
                <span class="ticket-o">🎟</span>
                <span>chr</span>
                <span class="speed-lines">
                    <i></i><i></i><i></i>
                </span>
            </div>
        </section>

        <!-- Onboarding carousel -->
        <section class="screen onboarding-screen">
            <div class="onboarding-content">
                <div class="illustration-wrap">
                    <img
                        id="onboarding-image"
                        class="onboarding-illustration"
                        src="assets/slide1.png"
                        alt="Onboarding illustration"
                    >
                </div>

                <section class="onboard-text">
                    <h1 id="onboard-title">All your favorites</h1>
                    <p id="onboard-description">
                        Get all your loved foods in one place, you just place the order we do the rest
                    </p>
                </section>

                <div class="onboard-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>

                <a class="next-btn" href="auth.html" id="getStartedBtn">LOGIN</a>
                <a class="skip-btn" href="#">Skip</a>
            </div>
        </section>

    </section>
</main>

<script>
const onboardingSlides = [
    {
        image: "assets/slide1.png",
        title: "All your favorites",
        description: "Get all your loved foods in one place, you just place the order we do the rest"
    },
    {
        image: "assets/slide2.png",
        title: "Discover nearby deals",
        description: "Explore restaurants, browse vouchers, and find the best offers near you"
    },
    {
        image: "assets/slide3.png",
        title: "Redeem with ease",
        description: "Claim your vouchers quickly and enjoy a seamless rewards experience"
    },
    {
        image: "assets/slide4.png",
        title: "Earn reward points",
        description: "Collect points, unlock rewards, and enjoy exclusive loyalty benefits"
    }
];

let currentSlide = 0;
let isChanging = false;

const textBlock = document.querySelector(".onboard-text");
const titleElement = document.getElementById("onboard-title");
const descriptionElement = document.getElementById("onboard-description");
const imageElement = document.getElementById("onboarding-image");
const dots = document.querySelectorAll(".onboard-dots .dot");
const getStartedBtn = document.getElementById("getStartedBtn");
const phone = document.querySelector(".phone");

function updateDots(index) {
    dots.forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
    });
}

function showSlide(index) {
    if (isChanging) return;
    isChanging = true;

    textBlock.classList.add("slide-out");
    imageElement.classList.add("image-changing");

    setTimeout(() => {
        currentSlide = index;

        titleElement.textContent = onboardingSlides[index].title;
        descriptionElement.textContent = onboardingSlides[index].description;
        imageElement.src = onboardingSlides[index].image;

        updateDots(index);

        textBlock.classList.remove("slide-out");
        textBlock.classList.add("slide-in");
        imageElement.classList.remove("image-changing");

        setTimeout(() => {
            textBlock.classList.remove("slide-in");
            isChanging = false;
        }, 350);
    }, 350);
}

updateDots(0);

let autoSlide = setInterval(() => {
    const nextSlide = (currentSlide + 1) % onboardingSlides.length;
    showSlide(nextSlide);
}, 2500);

dots.forEach((dot, index) => {
    dot.addEventListener("click", () => {
        clearInterval(autoSlide);
        showSlide(index);

        autoSlide = setInterval(() => {
            const nextSlide = (currentSlide + 1) % onboardingSlides.length;
            showSlide(nextSlide);
        }, 2500);
    });
});

getStartedBtn.addEventListener("click", function (event) {
    event.preventDefault();

    phone.classList.add("page-exit");

    setTimeout(() => {
        window.location.href = "auth.html";
    }, 520);
});
</script>
</body>
</html>
